<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#08080a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mi Biblioteca"/>
  <title>Mi Biblioteca</title>
  <link rel="manifest" id="manifest-placeholder"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#08080a;--surface:#0f0f11;--border:#1e1e22;--border2:#2a2a2e;--text:#e0e0e0;--text-dim:#666;--text-muted:#333;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'Inconsolata',monospace;min-height:100vh;overscroll-behavior:none}
    .header{position:sticky;top:0;z-index:50;background:rgba(8,8,10,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + .9rem) 1.25rem .9rem}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:.75rem}
    .header-eyebrow{font-size:.58rem;color:var(--text-muted);letter-spacing:.22em;text-transform:uppercase;margin-bottom:2px}
    .header-title{font-family:'Cinzel',serif;font-size:clamp(1.2rem,5vw,1.7rem);font-weight:600;letter-spacing:.04em;color:#f0f0f0;line-height:1}
    .header-actions{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
    .save-indicator{font-size:.58rem;font-family:monospace;letter-spacing:.08em;opacity:0;transition:opacity .4s;white-space:nowrap}
    .save-indicator.visible{opacity:1}.save-indicator.saved{color:#4ade80}.save-indicator.saving{color:var(--text-dim)}.save-indicator.error{color:#f87171}
    .btn-add{border:none;border-radius:8px;padding:.5rem 1rem;color:#000;font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:.04em;white-space:nowrap;-webkit-appearance:none;transition:opacity .2s,transform .15s}
    .fab{position:fixed;bottom:calc(var(--safe-bottom) + 5rem);right:1.25rem;z-index:55;width:52px;height:52px;border-radius:50%;border:none;color:#000;font-size:1.6rem;font-weight:300;line-height:1;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;-webkit-appearance:none;transition:transform .15s,opacity .2s}
    .fab:active{transform:scale(.92);opacity:.85}
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:2rem;animation:fadeIn .15s ease}
    .confirm-box{background:#0d0d0f;border:1px solid #2a2a2e;border-radius:16px;padding:1.5rem;width:100%;max-width:320px;text-align:center}
    .confirm-title{font-family:'Cinzel',serif;color:#f0f0f0;font-size:.95rem;margin-bottom:.5rem;letter-spacing:.04em}
    .confirm-msg{font-size:.75rem;color:#666;font-family:monospace;margin-bottom:1.25rem;line-height:1.5}
    .confirm-btns{display:flex;gap:.6rem}
    .confirm-btn-cancel{flex:1;background:transparent;border:1px solid #2a2a2e;border-radius:8px;padding:.6rem;color:#555;font-family:monospace;font-size:.76rem;cursor:pointer;-webkit-appearance:none}
    .confirm-btn-ok{flex:1;background:#f87171;border:none;border-radius:8px;padding:.6rem;color:#000;font-family:'Cinzel',serif;font-size:.76rem;font-weight:700;cursor:pointer;-webkit-appearance:none;letter-spacing:.03em}
    /* crop modal */
    .crop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:1.25rem}
    .crop-title{font-family:'Cinzel',serif;color:#f0f0f0;font-size:.9rem;letter-spacing:.06em}
    .crop-workspace{position:relative;width:min(340px,92vw);height:min(440px,75vw);background:#111;border-radius:12px;overflow:hidden;touch-action:none;flex-shrink:0}
    .crop-img{position:absolute;transform-origin:top left;user-select:none;-webkit-user-select:none;pointer-events:none}
    .crop-shade-top,.crop-shade-bot,.crop-shade-left,.crop-shade-right{position:absolute;background:rgba(0,0,0,.6);z-index:2;pointer-events:none}
    .crop-sel{position:absolute;z-index:3;box-sizing:border-box;border:2px solid #fff;touch-action:none}
    .crop-grid-line{position:absolute;background:rgba(255,255,255,.18);pointer-events:none;z-index:4}
    .crop-handle{position:absolute;width:24px;height:24px;z-index:5;touch-action:none}
    .crop-handle::before{content:'';position:absolute;background:#fff;border-radius:2px}
    .crop-handle::after{content:'';position:absolute;background:#fff;border-radius:2px}
    .crop-handle.tl{top:-2px;left:-2px;cursor:nw-resize}.crop-handle.tl::before{top:0;left:0;width:14px;height:3px}.crop-handle.tl::after{top:0;left:0;width:3px;height:14px}
    .crop-handle.tr{top:-2px;right:-2px;cursor:ne-resize}.crop-handle.tr::before{top:0;right:0;width:14px;height:3px}.crop-handle.tr::after{top:0;right:0;width:3px;height:14px}
    .crop-handle.bl{bottom:-2px;left:-2px;cursor:sw-resize}.crop-handle.bl::before{bottom:0;left:0;width:14px;height:3px}.crop-handle.bl::after{bottom:0;left:0;width:3px;height:14px}
    .crop-handle.br{bottom:-2px;right:-2px;cursor:se-resize}.crop-handle.br::before{bottom:0;right:0;width:14px;height:3px}.crop-handle.br::after{bottom:0;right:0;width:3px;height:14px}
    .crop-handle.tm{top:-2px;left:50%;transform:translateX(-50%);cursor:n-resize}.crop-handle.tm::before{top:0;left:5px;width:14px;height:3px}.crop-handle.tm::after{display:none}
    .crop-handle.bm{bottom:-2px;left:50%;transform:translateX(-50%);cursor:s-resize}.crop-handle.bm::before{bottom:0;left:5px;width:14px;height:3px}.crop-handle.bm::after{display:none}
    .crop-handle.ml{left:-2px;top:50%;transform:translateY(-50%);cursor:w-resize}.crop-handle.ml::before{left:0;top:5px;width:3px;height:14px}.crop-handle.ml::after{display:none}
    .crop-handle.mr{right:-2px;top:50%;transform:translateY(-50%);cursor:e-resize}.crop-handle.mr::before{right:0;top:5px;width:3px;height:14px}.crop-handle.mr::after{display:none}
    .crop-hint{font-size:.62rem;color:#444;font-family:monospace;text-align:center}
    .crop-btns{display:flex;gap:.75rem}
    .crop-btn{border:none;border-radius:8px;padding:.6rem 1.4rem;font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;cursor:pointer;-webkit-appearance:none}
    .btn-add:active{transform:scale(.95);opacity:.85}
    .stats-bar{padding:.55rem 1.25rem;display:flex;gap:.6rem;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;border-bottom:1px solid var(--border);background:rgba(8,8,10,.6)}
    .stats-bar::-webkit-scrollbar{display:none}
    .stat{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .stat-dot{width:5px;height:5px;border-radius:50%}.stat-label{font-size:.62rem;color:var(--text-dim)}.stat-count{font-size:.62rem;font-weight:500}
    .filters{padding:.65rem 1.25rem;display:flex;gap:.45rem;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;align-items:center;border-bottom:1px solid var(--border)}
    .filters::-webkit-scrollbar{display:none}
    .search-input{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:.35rem .85rem;color:var(--text);font-family:monospace;font-size:.73rem;outline:none;width:115px;flex-shrink:0;-webkit-appearance:none}
    .search-input::placeholder{color:#3a3a3e}
    .filter-btn{flex-shrink:0;background:transparent;border:1px solid var(--border2);border-radius:20px;padding:.32rem .75rem;color:var(--text-dim);font-family:monospace;font-size:.67rem;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-appearance:none}
    .filter-btn.active{color:#000;font-weight:600}.filter-btn:active{transform:scale(.95)}
    .main{padding:.6rem 1.25rem calc(var(--safe-bottom) + 5.5rem)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.85rem}
    .empty{text-align:center;color:var(--text-muted);padding:4rem 1rem;font-size:.82rem;line-height:2}
    .empty-icon{font-size:2.5rem;display:block;margin-bottom:.5rem;opacity:.25}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .15s;cursor:pointer}
    .card:active{transform:scale(.97)}
    .card-cover{position:relative;padding-top:138%;background:#0a0a0c;overflow:hidden}
    .card-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
    .card-cover-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:linear-gradient(135deg,#0f0f11,#1a1a1e)}
    .card-badge-status{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);border-radius:20px;padding:3px 8px;display:flex;align-items:center;gap:4px;border:1px solid transparent}
    .card-badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}.card-badge-text{font-size:.56rem;font-family:monospace;letter-spacing:.03em}
    .card-badge-ep{position:absolute;bottom:7px;right:7px;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);border-radius:6px;padding:3px 7px;border:1px solid rgba(255,255,255,.06)}
    .card-badge-ep span{font-size:.58rem;color:#999;font-family:monospace}
    .card-body{padding:.7rem;flex:1;display:flex;flex-direction:column;gap:.28rem}
    .card-title{font-family:'Cinzel',serif;font-size:.76rem;color:var(--text);line-height:1.3;letter-spacing:.02em}
    .card-author{font-size:.62rem;color:#777;font-family:monospace}
    .card-desc{font-size:.63rem;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-stars{display:flex;gap:1px;align-items:center;margin-top:1px}.card-star{font-size:.6rem;line-height:1}
    .card-tag{font-size:.55rem;font-family:monospace;padding:2px 6px;border-radius:10px;border:1px solid transparent}
    .card-link{display:inline-flex;align-items:center;gap:4px;font-size:.58rem;color:#818cf8;text-decoration:none;font-family:monospace;border:1px solid rgba(129,140,248,.2);border-radius:5px;padding:2px 6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,10,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:var(--safe-bottom);z-index:60}
    .bottom-nav::-webkit-scrollbar{display:none}
    .nav-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.55rem 1.1rem;background:none;border:none;cursor:pointer;-webkit-appearance:none;min-width:72px}
    .nav-btn:active{opacity:.6}.nav-icon{font-size:1.2rem;line-height:1}
    .nav-label{font-family:'Inconsolata',monospace;font-size:.58rem;letter-spacing:.04em;white-space:nowrap}
    .nav-indicator{width:4px;height:4px;border-radius:50%;margin-top:2px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:#0d0d0f;border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:1.4rem 1.25rem calc(var(--safe-bottom) + 1.5rem);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
    @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto}
    .modal-close-btn{background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:50%;width:30px;height:30px;color:#aaa;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;-webkit-appearance:none;flex-shrink:0}
    .modal-title{font-family:'Cinzel',serif;color:var(--text);font-size:.95rem;letter-spacing:.08em}
    .modal-cover-row{display:flex;gap:.85rem;margin-bottom:1rem}
    .cover-upload{width:76px;height:107px;border-radius:8px;border:2px dashed #2a2a2e;background:#111;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;position:relative}
    .cover-upload img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .cover-upload-label{font-size:.58rem;color:#444;text-align:center;padding:.4rem;line-height:1.5;position:relative;z-index:1}
    .modal-fields{flex:1;display:flex;flex-direction:column;gap:.55rem}
    .field-input{width:100%;background:#111113;border:1px solid var(--border2);border-radius:8px;padding:.55rem .75rem;color:var(--text);font-family:monospace;font-size:.78rem;outline:none;-webkit-appearance:none}
    .field-input:focus{border-color:#444}.field-input::placeholder{color:#3a3a3e}
    .field-row{display:flex;gap:.55rem}
    textarea.field-input{resize:vertical;min-height:68px}
    .field-label{font-size:.62rem;color:#555;font-family:monospace;margin-bottom:.35rem;display:block}
    .tags-wrap{background:#111113;border:1px solid var(--border2);border-radius:8px;padding:.4rem .6rem;display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:40px;cursor:text}
    .tags-wrap:focus-within{border-color:#444}
    .tag-chip{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-family:monospace;padding:2px 8px;border-radius:20px;border:1px solid transparent}
    .tag-chip-remove{background:none;border:none;cursor:pointer;font-size:.7rem;color:inherit;opacity:.6;padding:0;line-height:1;-webkit-appearance:none}
    .tag-text-input{background:none;border:none;outline:none;color:var(--text);font-family:monospace;font-size:.75rem;min-width:80px;flex:1;-webkit-appearance:none}
    .tag-text-input::placeholder{color:#3a3a3e}
    .tag-suggestions{background:#111113;border:1px solid var(--border2);border-radius:8px;margin-top:3px;overflow:hidden;max-height:120px;overflow-y:auto}
    .tag-suggestion{padding:.45rem .75rem;font-size:.73rem;font-family:monospace;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:6px}
    .tag-suggestion:active{background:var(--border)}
    .stars-row{display:flex;gap:1px;align-items:center}
    .star-btn{background:none;border:none;cursor:pointer;font-size:1.25rem;line-height:1;padding:3px 2px;-webkit-appearance:none}
    .star-btn:active{transform:scale(1.3)}
    .modal-footer{display:flex;gap:.55rem;justify-content:flex-end;margin-top:1.2rem}
    .btn-secondary{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:.5rem 1rem;color:#555;font-family:monospace;font-size:.76rem;cursor:pointer;-webkit-appearance:none}
    .btn-primary{border:none;border-radius:8px;padding:.5rem 1.2rem;color:#000;font-family:'Cinzel',serif;font-size:.76rem;font-weight:700;cursor:pointer;letter-spacing:.04em;-webkit-appearance:none}
    .btn-primary:disabled{opacity:.3;cursor:not-allowed}
    .btn-danger{background:transparent;border:1px solid #f8717133;border-radius:8px;padding:.5rem 1rem;color:#f87171;font-family:monospace;font-size:.76rem;cursor:pointer;-webkit-appearance:none;flex:1}
    .btn-edit{background:transparent;border:1px solid #4ade8033;border-radius:8px;padding:.5rem 1rem;color:#4ade80;font-family:monospace;font-size:.76rem;cursor:pointer;-webkit-appearance:none;flex:1}
    .toast{position:fixed;bottom:calc(var(--safe-bottom) + 5.5rem);left:50%;transform:translateX(-50%) translateY(40px);background:#1a1a1e;border:1px solid var(--border2);border-radius:20px;padding:.55rem 1.2rem;font-size:.73rem;color:var(--text);z-index:300;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;white-space:nowrap;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;gap:1.5rem}
    .login-emoji{font-size:3.5rem}
    .login-title{font-family:'Cinzel',serif;font-size:1.6rem;color:#f0f0f0;letter-spacing:.05em}
    .login-sub{font-size:.78rem;color:#555;line-height:1.6;max-width:260px}
    .btn-google{display:flex;align-items:center;gap:.75rem;background:#fff;border:none;border-radius:12px;padding:.75rem 1.5rem;font-family:'Inconsolata',monospace;font-size:.85rem;font-weight:600;color:#222;cursor:pointer;transition:opacity .2s,transform .15s;-webkit-appearance:none}
    .btn-google:active{transform:scale(.96);opacity:.85}
    .btn-google img{width:20px;height:20px}
    .user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid #333;cursor:pointer}
    .user-initials{width:28px;height:28px;border-radius:50%;background:#2a2a2e;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#888;cursor:pointer;border:1px solid #333}
    .install-banner{margin:.6rem 1.25rem;background:linear-gradient(135deg,rgba(129,140,248,.1),rgba(74,222,128,.07));border:1px solid rgba(129,140,248,.22);border-radius:12px;padding:.7rem .9rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
    .install-banner-text{font-size:.67rem;color:#aaa;line-height:1.5}
    .install-banner-text strong{color:#818cf8;display:block;font-family:'Cinzel',serif}
    .btn-install{background:#818cf8;border:none;border-radius:7px;padding:.4rem .85rem;color:#000;font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;cursor:pointer;flex-shrink:0;-webkit-appearance:none}
    .btn-dismiss{background:transparent;border:none;color:#444;font-size:1rem;cursor:pointer;flex-shrink:0;padding:.2rem}
    .uploading-cover{opacity:.5;pointer-events:none}
    /* staleness bar */
    .card-stale-bar{height:3px;width:100%;border-radius:0 0 0 0;transition:background .4s;flex-shrink:0}
    .card-stale-label{font-size:.56rem;font-family:monospace;letter-spacing:.02em;opacity:.75}
    /* reminder badge on card â€” floating alarm bubble */
    .card-alarm-btn{position:absolute;bottom:8px;left:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);border:1px solid rgba(250,204,21,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;line-height:1;-webkit-appearance:none;z-index:4;transition:transform .15s,border-color .2s}
    .card-alarm-btn:active{transform:scale(.88)}
    .card-alarm-btn.has-reminder{border-color:#facc15;box-shadow:0 0 8px rgba(250,204,21,.3)}
    /* reminder floating popup */
    .rem-popup-wrap{position:fixed;inset:0;z-index:450;display:flex;align-items:flex-end;justify-content:center;padding-bottom:calc(var(--safe-bottom) + 4.5rem)}
    .rem-popup-bg{position:absolute;inset:0}
    .rem-popup{position:relative;background:#0d0d0f;border:1px solid #2a2a2e;border-radius:18px;padding:1.2rem 1.2rem 1rem;width:min(340px,94vw);box-shadow:0 8px 40px rgba(0,0,0,.7);animation:slideUp .22s cubic-bezier(.34,1.56,.64,1)}
    .rem-popup-title{font-family:'Cinzel',serif;font-size:.9rem;color:#f0f0f0;margin-bottom:.15rem;display:flex;align-items:center;gap:.5rem}
    .rem-popup-sub{font-size:.68rem;color:#555;font-family:monospace;margin-bottom:1rem}
    .rem-close{margin-left:auto;background:none;border:none;color:#555;font-size:1rem;cursor:pointer;line-height:1;-webkit-appearance:none;padding:0}
    /* active reminder display */
    .rem-active{background:#facc1511;border:1px solid #facc1533;border-radius:10px;padding:.65rem .75rem;margin-bottom:.75rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
    .rem-active-text{font-size:.7rem;font-family:monospace;color:#facc15;line-height:1.5}
    .rem-active-sub{font-size:.61rem;color:#888;font-family:monospace;margin-top:2px}
    .btn-rem-cancel{background:none;border:1px solid #f8717133;border-radius:6px;padding:.28rem .6rem;color:#f87171;font-size:.62rem;font-family:monospace;cursor:pointer;-webkit-appearance:none;flex-shrink:0}
    /* date+time picker row */
    .rem-pickers{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.75rem}
    .rem-picker-box{background:#141416;border:1px solid #2a2a2e;border-radius:10px;padding:.55rem .65rem;display:flex;flex-direction:column;gap:.25rem;cursor:pointer;transition:border-color .18s}
    .rem-picker-box:focus-within{border-color:#facc1555}
    .rem-picker-label{font-size:.55rem;color:#555;font-family:monospace;letter-spacing:.07em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
    .rem-picker-label span{font-size:.75rem}
    .rem-picker-input{background:none;border:none;outline:none;color:#f0f0f0;font-family:monospace;font-size:.82rem;width:100%;cursor:pointer;-webkit-appearance:none;padding:0}

/* „1¤7„1¤7„1¤7„1¤7 CLOUDINARY „1¤7„1¤7 upload image „1¤7„1¤7„1¤7„1¤7 */
async function uploadToCloudinary(file) {
  const compressed = await compressImage(file, 900, 0.8);
  const formData = new FormData();
  formData.append('file', compressed);
  formData.append('upload_preset', 'cgymdwcn');
  formData.append('api_key', '858658259623972');
  const res = await fetch('https://api.cloudinary.com/v1_1/dmjboljwt/image/upload', {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.secure_url;
}

async function uploadImage(file) {
  // Try online upload first
  if (navigator.onLine) {
    return await uploadToCloudinary(file);
  }
  // Offline: compress and store as base64, mark for later upload
  return await new Promise((resolve) => {
    compressImage(file, 600, 0.6).then(blob => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result); // base64
      reader.readAsDataURL(blob);
    });
  });
}

// When back online, upload any pending base64 covers to Cloudinary
window.addEventListener('online', async () => {
  showToast('Conexi&oacute;n restaurada, sincronizando...');
  let changed = false;
  for (const sec of SECTIONS) {
    for (let i = 0; i < S.data[sec.id].length; i++) {
      const item = S.data[sec.id][i];
      if (item.cover && item.cover.startsWith('data:')) {
        try {
          // Convert base64 back to blob
          const res = await fetch(item.cover);
          const blob = await res.blob();
          const url = await uploadToCloudinary(blob);
          S.data[sec.id][i] = {...item, cover: url};
          changed = true;
        } catch(e) { /* keep base64 for now */ }
      }
    }
  }
  if (changed) { saveData(); render(); }
});

function compressImage(file, maxSize, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(resolve, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* „1¤7„1¤7„1¤7„1¤7 FIRESTORE SYNC „1¤7„1¤7„1¤7„1¤7 */
function loadOfflineBackup() {
  try {
    const raw = localStorage.getItem('bib-offline');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.data) SECTIONS.forEach(s=>{S.data[s.id]=d.data[s.id]||[];});
      if (d.tags) SECTIONS.forEach(s=>{S.tags[s.id]=d.tags[s.id]||[];});
      return true;
    }
  } catch(e) {}
  return false;
}

function subscribeToData() {
  if (S.unsubSnapshot) S.unsubSnapshot();
  if (!S.user) return;

  // Load offline backup immediately so UI shows something
  const hadOffline = loadOfflineBackup();
  if (hadOffline) render();

  const docRef = doc(db, 'users', S.user.uid);
  S.unsubSnapshot = onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
      const cloudData = snap.data();
      const offlineRaw = localStorage.getItem('bib-offline');

      if (offlineRaw) {
        // We have offline changes „1¤7„1¤7 merge: cloud is base, offline items win
        const offline = JSON.parse(offlineRaw);
        SECTIONS.forEach(s => {
          const cloudItems = (cloudData.data && cloudData.data[s.id]) || [];
          const offlineItems = offline.data[s.id] || [];
          // Build map of cloud items
          const map = {};
          cloudItems.forEach(i => map[i.id] = i);
          // Overlay offline items (they may be newer)
          offlineItems.forEach(i => map[i.id] = i);
          S.data[s.id] = Object.values(map);
          S.tags[s.id] = [...new Set([
            ...((cloudData.tags && cloudData.tags[s.id]) || []),
            ...(offline.tags[s.id] || [])
          ])];
        });
        // Push merged data back to cloud
        saveData();
      } else {
        // No offline changes, just use cloud data
        if (cloudData.data) SECTIONS.forEach(s=>{S.data[s.id]=cloudData.data[s.id]||[];});
        if (cloudData.tags) SECTIONS.forEach(s=>{S.tags[s.id]=cloudData.tags[s.id]||[];});
      }
    } else if (!snap.exists()) {
      loadOfflineBackup();
    }
    render();
  }, () => {
    // Firestore error (offline) „1¤7„1¤7 use localStorage backup
    loadOfflineBackup();
    render();
  });
}

let saveTimer = null;
function saveData() {
  // Always save locally first „1¤7„1¤7 this is the source of truth offline
  try {
    localStorage.setItem('bib-offline', JSON.stringify({data:S.data, tags:S.tags}));
  } catch(e) {}

  clearTimeout(saveTimer);
  setSaveStatus('saving');
  saveTimer = setTimeout(async () => {
    if (!S.user) { setSaveStatus('saved'); return; }
    try {
      await setDoc(doc(db,'users',S.user.uid), {
        data: S.data, tags: S.tags, updatedAt: Date.now()
      });
      setSaveStatus('saved');
      // Clear offline backup once synced to cloud
      localStorage.removeItem('bib-offline');
    } catch(e) {
      // Offline „1¤7„1¤7 data is safe in localStorage
      setSaveStatus('error');
    }
  }, 600);
}

let saveStatusTimer = null;
function setSaveStatus(s) {
  S.saveStatus = s;
  clearTimeout(saveStatusTimer);
  const el = document.getElementById('save-indicator');
  if (el) {
    el.className = s ? 'save-indicator visible '+s : 'save-indicator';
    el.textContent = s==='saving'?'sincronizando...':s==='saved'?'&#10022; guardado':s==='error'?'sin conexi&oacute;n':'';
  }
  if (s==='saved') saveStatusTimer = setTimeout(()=>setSaveStatus(null), 2000);
}

/* „1¤7„1¤7„1¤7„1¤7 HELPERS „1¤7„1¤7„1¤7„1¤7 */

/* âś¦âś¤ STALENESS âś¦âś¤ */
function staleColor(days){
  // 0 days = green, 7+ = yellow, 14+ = orange, 30+ = red
  if(days===null||days===undefined)return'#2a2a2e';
  if(days<=2)return'#4ade80';
  if(days<=6)return'#86efac';
  if(days<=13)return'#facc15';
  if(days<=29)return'#fb923c';
  return'#f87171';
}
function staleLabel(days){
  if(days===null||days===undefined)return null;
  if(days===0)return'hoy';
  if(days===1)return'ayer';
  if(days<7)return`hace ${days} d\xEDas`;
  if(days<14)return`hace 1 semana`;
  if(days<30)return`hace ${Math.floor(days/7)} sem.`;
  if(days<365)return`hace ${Math.floor(days/30)} mes${Math.floor(days/30)>1?'es':''}`;
  return`hace ${Math.floor(days/365)} a\xF1o${Math.floor(days/365)>1?'s':''}`;
}
function daysSince(ts){
  if(!ts)return null;
  return Math.floor((Date.now()-ts)/(1000*60*60*24));
}

/* âś¦âś¤ REMINDERS âś¦âś¤ */
function remindersKey(){return'bib-reminders';}
function getReminders(){try{return JSON.parse(localStorage.getItem(remindersKey())||'{}');}catch(e){return{};}}
function setReminder(itemId,daysFromNow,note){
  const r=getReminders();
  const fireAt=Date.now()+daysFromNow*24*60*60*1000;
  r[itemId]={fireAt,note:note||'',daysFromNow,setAt:Date.now()};
  localStorage.setItem(remindersKey(),JSON.stringify(r));
}
function cancelReminder(itemId){
  const r=getReminders();delete r[itemId];
  localStorage.setItem(remindersKey(),JSON.stringify(r));
  if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(reg=>{
      if(reg.active)reg.active.postMessage({type:'CANCEL',id:String(itemId)});
    });
  }
}
function getReminderForItem(itemId){
  return getReminders()[String(itemId)]||null;
}
function daysUntil(ts){
  if(!ts)return null;
  return Math.max(0,Math.ceil((ts-Date.now())/(1000*60*60*24)));
}
function checkDueReminders(){
  if(typeof Notification==='undefined')return;
  const r=getReminders();const now=Date.now();let changed=false;
  Object.entries(r).forEach(([id,rem])=>{
    if(rem.fireAt<=now){
      let title='Tu t\xEDtulo';
      for(const sec of SECTIONS){const item=(S.data[sec.id]||[]).find(i=>String(i.id)===String(id));if(item){title=item.title;break;}}
      if(Notification.permission==='granted'){
        if(navigator.serviceWorker&&navigator.serviceWorker.controller){
          navigator.serviceWorker.controller.postMessage({type:'NOTIFY',title:'\u2726 Recordatorio \u2014 Mi Biblioteca',body:rem.note?`${title}: ${rem.note}`:`Es hora de revisar: ${title}`});
        } else {
          new Notification('\u2726 Recordatorio \u2014 Mi Biblioteca',{body:rem.note?`${title}: ${rem.note}`:`Es hora de revisar: ${title}`,icon:'icon-192.png'});
        }
      }
      delete r[id];changed=true;
    }
  });
  if(changed)localStorage.setItem(remindersKey(),JSON.stringify(r));
}
async function requestNotifPermission(){
  if(typeof Notification==='undefined')return false;
  if(Notification.permission==='granted')return true;
  const result=await Notification.requestPermission();
  return result==='granted';
}
// Register Service Worker for background notifications
(function registerSW(){
  if(!('serviceWorker' in navigator))return;
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    function schedulePending(sw){
      const r=getReminders();
      Object.entries(r).forEach(([id,rem])=>{
        if(rem.fireAt>Date.now()){
          let title='Tu t\xEDtulo';
          for(const sec of SECTIONS){const item=(S.data[sec.id]||[]).find(i=>String(i.id)===String(id));if(item){title=item.title;break;}}
          const body=rem.note?`${title}: ${rem.note}`:`Es hora de revisar: ${title}`;
          sw.postMessage({type:'SCHEDULE',id:String(id),fireAt:rem.fireAt,title:'\u2726 Recordatorio \u2014 Mi Biblioteca',body});
        }
      });
    }
    navigator.serviceWorker.ready.then(r=>{if(r.active)schedulePending(r.active);});
  }).catch(e=>console.warn('SW no disponible:',e));
})();
function scheduleInSW(itemId,fireAt,note){
  let title='Tu t\xEDtulo';
  for(const sec of SECTIONS){const item=(S.data[sec.id]||[]).find(i=>String(i.id)===String(itemId));if(item){title=item.title;break;}}
  const body=note?`${title}: ${note}`:`Es hora de revisar: ${title}`;
  if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(r=>{
      if(r.active)r.active.postMessage({type:'SCHEDULE',id:String(itemId),fireAt,title:'\u2726 Recordatorio \u2014 Mi Biblioteca',body});
    });
  }
}

function getSuggestions(input){

  const known=S.tags[S.section]||[],cur=(S.modalForm&&S.modalForm.tags)||[];
  return known.filter(t=>t.toLowerCase().includes(input.toLowerCase())&&!cur.includes(t)).slice(0,6);

function addTag(tag){
  tag=tag.trim();if(!tag||!S.modalForm)return;
  if(!S.modalForm.tags)S.modalForm.tags=[];
  if(S.modalForm.tags.includes(tag))return;
  S.modalForm.tags=[...S.modalForm.tags,tag];
  if(!S.tags[S.section].includes(tag))S.tags[S.section].push(tag);
  S.tagInput='';rerenderTags();
}
function removeTag(tag){
  if(!S.modalForm)return;
  S.modalForm.tags=(S.modalForm.tags||[]).filter(t=>t!==tag);
  rerenderTags();
}
function rerenderTags(){
  const w=document.getElementById('tags-wrap'),sg=document.getElementById('tag-suggestions');
  if(w)w.innerHTML=tagsWrapInner();if(sg)sg.innerHTML=tagSuggestionsHtml();
  setupTagInput();const inp=document.getElementById('tag-input');if(inp)inp.focus();

function setupCrop(src){
  const ws = document.getElementById('crop-workspace');
  const img = document.getElementById('crop-img');
  if(!ws||!img)return;

  let imgX=0,imgY=0,imgW=0,imgH=0;
  let sel={x:0,y:0,w:0,h:0};
  const MIN=40;

  function updateShades(){
    const top=document.getElementById('cs-top'),bot=document.getElementById('cs-bot');
    const left=document.getElementById('cs-left'),right=document.getElementById('cs-right');
    const ww=ws.offsetWidth,wh=ws.offsetHeight;
    top.style.cssText=`left:0;top:0;width:${ww}px;height:${sel.y}px`;
    bot.style.cssText=`left:0;top:${sel.y+sel.h}px;width:${ww}px;height:${wh-(sel.y+sel.h)}px`;
    left.style.cssText=`left:0;top:${sel.y}px;width:${sel.x}px;height:${sel.h}px`;
    right.style.cssText=`left:${sel.x+sel.w}px;top:${sel.y}px;width:${ww-(sel.x+sel.w)}px;height:${sel.h}px`;
  }

  function updateGrid(){
    const g1=document.getElementById('cg1'),g2=document.getElementById('cg2');
    const g3=document.getElementById('cg3'),g4=document.getElementById('cg4');
    const t1=Math.round(sel.w/3),t2=Math.round(sel.w*2/3);
    const t3=Math.round(sel.h/3),t4=Math.round(sel.h*2/3);
    g1.style.cssText=`left:${t1}px;top:0;width:1px;height:100%`;
    g2.style.cssText=`left:${t2}px;top:0;width:1px;height:100%`;
    g3.style.cssText=`top:${t3}px;left:0;height:1px;width:100%`;
    g4.style.cssText=`top:${t4}px;left:0;height:1px;width:100%`;
  }

  function applySel(){
    const s=document.getElementById('crop-sel');
    if(!s)return;
    s.style.left=sel.x+'px';s.style.top=sel.y+'px';
    s.style.width=sel.w+'px';s.style.height=sel.h+'px';
    updateShades();updateGrid();
  }

  img.onload=function(){
    const ww=ws.offsetWidth,wh=ws.offsetHeight;
    const sc=Math.min(ww/img.naturalWidth,wh/img.naturalHeight);
    imgW=img.naturalWidth*sc;imgH=img.naturalHeight*sc;
    imgX=(ww-imgW)/2;imgY=(wh-imgH)/2;
    img.style.cssText=`left:${imgX}px;top:${imgY}px;width:${imgW}px;height:${imgH}px;position:absolute`;
    sel={x:imgX,y:imgY,w:imgW,h:imgH};
    applySel();
  };
  img.src=src;

  let activeHandle=null,dragSel=false;
  let startX=0,startY=0,startSel={};

  function getPoint(e){
    const r=ws.getBoundingClientRect();
    if(e.touches&&e.touches.length){return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};}
    return{x:e.clientX-r.left,y:e.clientY-r.top};
  }

  function clampSel(s){
    const ww=ws.offsetWidth,wh=ws.offsetHeight;
    s.w=Math.max(MIN,s.w);s.h=Math.max(MIN,s.h);
    s.x=Math.max(0,Math.min(ww-s.w,s.x));
    s.y=Math.max(0,Math.min(wh-s.h,s.y));
    s.w=Math.min(ww-s.x,s.w);s.h=Math.min(wh-s.y,s.h);
    return s;
  }

  function onDown(e){
    e.preventDefault();
    const h=e.target.dataset&&e.target.dataset.h;
    const pt=getPoint(e);
    startX=pt.x;startY=pt.y;startSel={...sel};
    if(h){activeHandle=h;dragSel=false;}
    else{activeHandle=null;dragSel=true;}
  }

  function onMove(e){
    e.preventDefault();
    if(!activeHandle&&!dragSel)return;
    const pt=getPoint(e);
    const dx=pt.x-startX,dy=pt.y-startY;
    let s={...startSel};
    if(dragSel){
      s.x=startSel.x+dx;s.y=startSel.y+dy;
      sel=clampSel(s);
    } else {
      const h=activeHandle;
      if(h==='tl'||h==='ml'||h==='bl'){s.x=startSel.x+dx;s.w=startSel.w-dx;}
      if(h==='tr'||h==='mr'||h==='br'){s.w=startSel.w+dx;}
      if(h==='tl'||h==='tm'||h==='tr'){s.y=startSel.y+dy;s.h=startSel.h-dy;}
      if(h==='bl'||h==='bm'||h==='br'){s.h=startSel.h+dy;}
      sel=clampSel(s);
    }
    applySel();
  }

  function onUp(){activeHandle=null;dragSel=false;}

  ws.addEventListener('mousedown',onDown);
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onUp);
  ws.addEventListener('touchstart',onDown,{passive:false});
  ws.addEventListener('touchmove',onMove,{passive:false});
  ws.addEventListener('touchend',onUp);

  document.getElementById('crop-confirm').addEventListener('click',function(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const canvas=document.createElement('canvas');
    canvas.width=sel.w*dpr;canvas.height=sel.h*dpr;
    const ctx=canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    const scaleX=img.naturalWidth/imgW,scaleY=img.naturalHeight/imgH;
    const sx=(sel.x-imgX)*scaleX,sy=(sel.y-imgY)*scaleY;
    const sw=sel.w*scaleX,sh=sel.h*scaleY;
    ctx.drawImage(img,sx,sy,sw,sh,0,0,sel.w,sel.h);
    const dataUrl=canvas.toDataURL('image/jpeg',0.88);
    if(S.modalForm)S.modalForm.cover=dataUrl;
    fetch(dataUrl).then(r=>r.blob()).then(blob=>{S.pendingFile=blob;});
    const overlay=document.getElementById('crop-overlay');if(overlay)overlay.remove();
    const cup=document.getElementById('cover-upload-btn');
    if(cup){
      cup.innerHTML=`<img src="${dataUrl}"/><span class="cover-upload-label" style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.58rem">Cambiar</span><button id="btn-remove-cover" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:1px solid #f8717155;border-radius:50%;width:22px;height:22px;color:#f87171;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;-webkit-appearance:none">&#10005;</button>`;
      const brc=cup.querySelector('#btn-remove-cover');
      if(brc)brc.addEventListener('click',function(e){e.stopPropagation();if(S.modalForm)S.modalForm.cover='';S.pendingFile=null;render();});
    }
  });

  document.getElementById('crop-cancel').addEventListener('click',function(){
    const overlay=document.getElementById('crop-overlay');if(overlay)overlay.remove();
  });
}

function renderDetailModal(item){
  const sec=curSec(),cfg=STATE_CFG[item.status]||STATE_CFG['Pendiente'],slbl=stateLabel(S.section,item.status),color=sec.color;
  const linksArr=item.links&&item.links.length?item.links:(item.link?[item.link]:[]);
  const coverHtml=item.cover?`<img src="${esc(item.cover)}" style="width:100%;max-height:320px;object-fit:cover;display:block" onerror="imgErr(this)"/>`:`<div style="width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:4rem;background:linear-gradient(135deg,#0f0f11,#1a1a1e)">${sec.emoji}</div>`;
  const tagsHtml=(item.tags&&item.tags.length)?`<div style="margin-bottom:.85rem"><p style="font-size:.6rem;color:#444;font-family:monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem">G&eacute;neros</p><div style="display:flex;flex-wrap:wrap;gap:3px">${item.tags.map(t=>`<span class="card-tag" style="background:${hex2rgba(color,.12)};border-color:${hex2rgba(color,.3)};color:${color}">${esc(t)}</span>`).join('')}</div></div>`:'';
  const starsRow=item.rating?`<div style="margin-bottom:.85rem"><p style="font-size:.6rem;color:#444;font-family:monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem">Calificaci&oacute;n</p><div class="card-stars">${starsHtml(item.rating,'0.9rem')}<span style="font-size:.72rem;color:#888;margin-left:6px">${item.rating}/10</span></div></div>`:'';
  const linksHtml=linksArr.length?`<div style="margin-bottom:.85rem"><p style="font-size:.6rem;color:#444;font-family:monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem">Enlaces</p><div style="display:flex;flex-direction:column;gap:.4rem">${linksArr.map(l=>`<a href="${esc(l)}" target="_blank" rel="noopener" class="card-link" style="font-size:.7rem;padding:5px 10px;max-width:100%">&#128279; ${esc(shortenUrl(l))}</a>`).join('')}</div></div>`:'';
  // Timeline â€” status + chapter changes
  const hist=item.statusHistory||[];
  const timelineItems=hist.map(h=>{
    const isChap=h.type==='chapter';
    const hcfg=isChap?null:(STATE_CFG[h.status]||STATE_CFG['Pendiente']);
    const dotColor=isChap?'#818cf8':hcfg.accent;
    const label=isChap?`${sec.epLabel||'Cap.'} ${esc(h.chapter)}`:(stateLabel(sec.id,h.status));
    const labelColor=isChap?'#818cf8':hcfg.accent;
    const d=new Date(h.date);
    const dateStr=d.toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});
    return`<div class="timeline-item" style="--dot-color:${dotColor}"><span class="timeline-label" style="color:${labelColor}">${label}</span><span class="timeline-date">${dateStr}</span></div>`;

function showConfirm(title, msg, onOk){
  const div=document.createElement('div');
  div.className='confirm-overlay';
  div.innerHTML=`<div class="confirm-box">
    <p class="confirm-title">${title}</p>
    <p class="confirm-msg">${msg}</p>
    <div class="confirm-btns">
      <button class="confirm-btn-cancel" id="conf-cancel">Cancelar</button>
      <button class="confirm-btn-ok" id="conf-ok">Confirmar</button>
    </div></div>`;
  document.body.appendChild(div);
  div.querySelector('#conf-cancel').addEventListener('click',()=>div.remove());
  div.querySelector('#conf-ok').addEventListener('click',()=>{div.remove();onOk();});
  div.addEventListener('click',e=>{if(e.target===div)div.remove();});
}

function showReminderPopup(itemId){
  const existing=document.getElementById('rem-popup-wrap');if(existing)existing.remove();
  const rem=getReminderForItem(itemId);
  let item=null;
  for(const sec of SECTIONS){const found=(S.data[sec.id]||[]).find(i=>String(i.id)===String(itemId));if(found){item=found;break;}}
  const title=item?item.title:'';

  // Default date = tomorrow, time = current rounded to next half hour
  const defDate=new Date(Date.now()+24*60*60*1000);
  const pad=n=>String(n).padStart(2,'0');
  const defDateStr=`${defDate.getFullYear()}-${pad(defDate.getMonth()+1)}-${pad(defDate.getDate())}`;
  const now=new Date();let h=now.getHours(),m=now.getMinutes();
  m=m<30?30:0;if(m===0)h=(h+1)%24;
  const defTimeStr=`${pad(h)}:${pad(m)}`;

  const activeHtml=rem
    ?`<div class="rem-active"><div><div class="rem-active-text">\u23F0 ${new Date(rem.fireAt).toLocaleDateString('es',{weekday:'short',day:'numeric',month:'short'})} \u2014 ${new Date(rem.fireAt).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</div>${rem.note?`<div class="rem-active-sub">${esc(rem.note)}</div>`:''}</div><button class="btn-rem-cancel" id="rem-cancel-btn">Quitar</button></div>`:'';

  const wrap=document.createElement('div');
  wrap.id='rem-popup-wrap';wrap.className='rem-popup-wrap';
  wrap.innerHTML=`<div class="rem-popup-bg" id="rem-popup-bg"></div>
    <div class="rem-popup">
      <div class="rem-popup-title">\u23F0 Recordatorio<button class="rem-close" id="rem-close">\u2715</button></div>
      <p class="rem-popup-sub">Av\xEDsame revisar este t\xEDtulo en:</p>
      ${activeHtml}
      <div class="rem-pickers">
        <div class="rem-picker-box">
          <div class="rem-picker-label">Fecha</div>
          <input class="rem-picker-input" type="date" id="rem-date" value="${defDateStr}"/>
        </div>
        <div class="rem-picker-box">
          <div class="rem-picker-label">Hora</div>
          <input class="rem-picker-input" type="time" id="rem-time" value="${defTimeStr}"/>
        </div>
      </div>
      <div class="rem-preview" id="rem-preview">
        <span class="rem-preview-empty">Selecciona una fecha y hora</span>
      </div>
      <textarea class="rem-note-input" id="rem-note" placeholder="Nota (ej: revisar cap. 90...)" rows="2"></textarea>
      <button class="rem-save-btn" id="rem-save-btn">Guardar recordatorio</button>
    </div>`;
  document.body.appendChild(wrap);

  const dateInput=document.getElementById('rem-date');
  const timeInput=document.getElementById('rem-time');
  const preview=document.getElementById('rem-preview');
  const saveBtn=document.getElementById('rem-save-btn');

  const DAYS=['dom.','lun.','mar.',`mi\u00e9.`,'jue.','vie.',`s\u00e1b.`];
  const MONTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  function updatePreview(){
    const dv=dateInput.value,tv=timeInput.value;
    if(!dv||!tv){preview.innerHTML='<span class="rem-preview-empty">Selecciona una fecha y hora</span>';saveBtn.disabled=true;return;}
    const dt=new Date(`${dv}T${tv}`);
    if(isNaN(dt)){preview.innerHTML='<span class="rem-preview-empty">Fecha inv\xE1lida</span>';saveBtn.disabled=true;return;}
    const day=DAYS[dt.getDay()];
    const d=dt.getDate();
    const mo=MONTHS[dt.getMonth()];
    let hh=dt.getHours(),mm=dt.getMinutes();
    const ampm=hh<12?'a.m.':'p.m.';
    hh=hh%12||12;
    const timeStr=`${hh}:${pad(mm)} ${ampm}`;
    preview.innerHTML=`<span class="rem-preview-text">\u2726 Te avisar\xE9 el ${day} ${d} ${mo} a las ${timeStr}</span>`;
    saveBtn.disabled=dt<=new Date();
  }

  dateInput.addEventListener('input',updatePreview);
  timeInput.addEventListener('input',updatePreview);
  updatePreview();

  document.getElementById('rem-popup-bg').onclick=()=>wrap.remove();
  document.getElementById('rem-close').onclick=()=>wrap.remove();
  const cancelBtn=document.getElementById('rem-cancel-btn');
  if(cancelBtn)cancelBtn.onclick=()=>{cancelReminder(itemId);wrap.remove();renderGrid();showToast('Recordatorio cancelado');};

  saveBtn.addEventListener('click',async()=>{
    const dv=dateInput.value,tv=timeInput.value;
    if(!dv||!tv)return;
    const fireAt=new Date(`${dv}T${tv}`).getTime();
    if(isNaN(fireAt)||fireAt<=Date.now())return;
    const note=(document.getElementById('rem-note')||{}).value||'';
    const r=getReminders();r[String(itemId)]={fireAt,note,setAt:Date.now()};
    localStorage.setItem(remindersKey(),JSON.stringify(r));
    scheduleInSW(itemId,fireAt,note);
    const granted=await requestNotifPermission();
    wrap.remove();renderGrid();
    showToast(granted?'\u23F0 Recordatorio guardado':'\u23F0 Guardado \u2014 activa notificaciones para alertas');
  });
}

async function saveItem(){
  const f=S.modalForm;if(!f||!f.title.trim())return;
  if(S.tagInput.trim())addTag(S.tagInput);
  const li=document.getElementById('link-input');
  if(li&&li.value.trim()){if(!f.links)f.links=[];f.links.push(li.value.trim());}

  // If there's a pending file to upload, do it now
  const itemId = f.id || String(Date.now());
  if (S.pendingFile) {
    const bsave = document.getElementById('btn-save-item');
    if(bsave){bsave.disabled=true;bsave.textContent='Subiendo...';}
    setSaveStatus('saving');
    try {
      const url = await uploadImage(S.pendingFile);
      f.cover = url;
      S.pendingFile = null;
    } catch(e) {
      showToast('Error al subir imagen');
      const bsave2=document.getElementById('btn-save-item');if(bsave2){bsave2.disabled=false;bsave2.textContent='Guardar';}
      return;
    }
  }

  const item={...f,id:itemId,tags:f.tags||[],links:f.links||[]};
  const prev=S.data[S.section].find(i=>String(i.id)===String(itemId));
  item.updatedAt=Date.now();
  if(!item.statusHistory)item.statusHistory=[];
  const prevStatus=prev?prev.status:null;
  const prevChapter=prev?prev.chapter:null;
  if(!prev){
    item.statusHistory=[{status:item.status,date:Date.now()}];
  } else {
    const base=prev.statusHistory||[{status:prevStatus,date:prev.updatedAt||Date.now()}];
    const entries=[...base];
    if(prevStatus&&prevStatus!==item.status)
      entries.push({status:item.status,date:Date.now()});
    if(item.chapter&&String(item.chapter)!==String(prevChapter||''))
      entries.push({type:'chapter',chapter:item.chapter,date:Date.now()});
    item.statusHistory=entries;
  }
  if(f.id){
    S.data[S.section]=S.data[S.section].map(i=>String(i.id)===String(f.id)?item:i);
    showToast('&#10022; Guardado');
  }else{
    S.data[S.section]=[...S.data[S.section],item];
    showToast('&#10022; Agregado');
  }
  saveData();closeModal();
}

  const cfg=STATE_CFG[item.status]||STATE_CFG['Pendiente'];
  const coverHtml=item.cover
    ?`<img class="qvh-cover" src="${esc(item.cover)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="qvh-cover-placeholder" style="display:none">${sec.emoji}</div>`
    :`<div class="qvh-cover-placeholder">${sec.emoji}</div>`;
  const metaParts=[sec.label];
  if(item.rating) metaParts.push('\u2605 '+item.rating+'/10');
  if(item.tags&&item.tags.length) metaParts.push(item.tags.slice(0,2).join(' \u00B7 '));

  const overlay=document.createElement('div');
  overlay.id='qvh-overlay';
  overlay.className='qvh-overlay';
  overlay.innerHTML=`
    <div class="qvh-card" id="qvh-card">
      <div style="position:relative">
        ${coverHtml}
        <button class="qvh-close" id="qvh-close">\u2715</button>
        <div style="position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);border-radius:20px;padding:3px 10px;border:1px solid ${cfg.accent}44">
          <span style="font-size:.6rem;color:${cfg.accent};font-family:monospace">${esc(sec.label)}</span>
        </div>
      </div>
      <div class="qvh-body">
        <p class="qvh-eyebrow">\u2728 para hoy te sugiero</p>
        <h2 class="qvh-title">${esc(item.title)}</h2>
        <p class="qvh-meta">${esc(metaParts.join(' \u00B7 '))}</p>
        ${item.description?`<p class="qvh-desc">${esc(item.description)}</p>`:''}
        <div class="qvh-actions">
          <button class="qvh-btn-reroll" id="qvh-reroll">\uD83C\uDFB2 Otra</button>
          <button class="qvh-btn-go" id="qvh-go" style="background:linear-gradient(135deg,${sec.color},#4ade80)">Ver detalles</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.getElementById('qvh-close').addEventListener('click',()=>overlay.remove());

  document.getElementById('qvh-reroll').addEventListener('click',()=>{
    // Pick a different one
    let next;
    if(pool.length===1){next=pool[0];}
    else{
      do{next=pool[Math.floor(Math.random()*pool.length)];}
      while(next.item.id===item.id);
    }
    overlay.remove();
    renderQueVeoHoyModal(next,pool);
  });

  document.getElementById('qvh-go').addEventListener('click',()=>{
    overlay.remove();
    // Switch to that section and open detail
    S.section=sec.id;S.filter='Todos';S.search='';
    render();
    setTimeout(()=>openDetailById(item.id),80);
  });
}
