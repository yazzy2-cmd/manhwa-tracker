  const div=document.createElement('div');
  div.className='collib-picker-overlay';
  function buildList(q){
    return getAllItems().filter(({item})=>item.title.toLowerCase().includes(q.toLowerCase())).slice(0,50);
  }
  function renderList(items){
    if(!items.length)return'<p style="color:#444;font-family:monospace;font-size:.72rem;text-align:center;padding:1rem">No hay resultados</p>';
    return items.map(({item,sec})=>`<div class="col-picker-item" data-pick-id="${esc(item.id)}">
      ${item.cover?`<img class="colit-cover" src="${esc(item.cover)}" onerror="this.style.display='none'"/>`:`<div class="colit-cover-ph">${sec.emoji}</div>`}
      <div>
        <div style="font-family:'Cinzel',serif;font-size:.75rem;color:#e0e0e0">${esc(item.title)}</div>
        <div style="font-size:.6rem;color:#555;font-family:monospace">${sec.label} &middot; ${esc(item.status||'')}</div>
      </div>
    </div>`).join('');
  }
  div.innerHTML=`<div class="collib-picker">
    <div class="col-picker-title" style="font-family:'Cinzel',serif;color:#f0f0f0;font-size:.9rem;letter-spacing:.06em;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between">
      Vincular a tu biblioteca <button id="collib-picker-close" style="background:none;border:none;color:#555;font-size:1rem;cursor:pointer">&#10005;</button>
    </div>
    <p style="font-size:.68rem;color:#555;font-family:monospace;margin-bottom:.65rem">Elige el título de tu biblioteca con el que quieres sincronizar el progreso.</p>
    <input class="col-picker-search" id="collib-picker-search" type="search" placeholder="Buscar en tu biblioteca..."/>
    <div class="col-picker-list" id="collib-picker-list">${renderList(buildList(''))}</div>
  </div>`;
  document.body.appendChild(div);
  div.addEventListener('click',e=>{if(e.target===div)div.remove();});
  div.querySelector('#collib-picker-close').onclick=()=>div.remove();
  const si=div.querySelector('#collib-picker-search');
  const li=div.querySelector('#collib-picker-list');
  function setupClicks(){
    li.querySelectorAll('[data-pick-id]').forEach(el=>{
      el.onclick=()=>{
        const ownId=el.getAttribute('data-pick-id');
        linkCollabItem(colId,libraryId,ownerUid,ownId).then(()=>div.remove());
      };
    });
  }
  si.oninput=()=>{li.innerHTML=renderList(buildList(si.value));setupClicks();};
  setupClicks();
  setTimeout(()=>si.focus(),150);
}

// ── "Agregar a colección" button in detail modal ─────────────────────────────
function showAddToColPicker(itemId){
  if(!S.colecciones.length){showToast('Crea una colección primero');return;}
  if(S.colecciones.length===1){
    const col=S.colecciones[0];
    const item=getAllItems().find(({item})=>String(item.id)===String(itemId));
    if(!item)return;
    const sec=SECTIONS.find(s=>s.id===S.section)||item.sec;
    addItemToColeccion(col.id,item.item,sec);
    return;
  }
  // picker if multiple colecciones
  const div=document.createElement('div');
  div.className='col-modal-overlay';
  div.innerHTML=`<div class="col-modal">
    <div class="col-modal-title">&#10022; Agregar a colección</div>
    ${S.colecciones.map(c=>`<div class="col-card" style="margin-bottom:.45rem" data-tocol-id="${esc(c.id)}"><div class="col-card-name">${esc(c.name)}</div><div class="col-card-meta">${(c.items||[]).length} títulos</div></div>`).join('')}
    <button class="btn-secondary" id="tocol-cancel" style="width:100%;margin-top:.5rem">Cancelar</button>
  </div>`;
  document.body.appendChild(div);
  div.addEventListener('click',e=>{if(e.target===div)div.remove();});
  div.querySelector('#tocol-cancel').onclick=()=>div.remove();
  div.querySelectorAll('[data-tocol-id]').forEach(el=>{
    el.onclick=()=>{
      const colId=el.getAttribute('data-tocol-id');
      const found=getAllItems().find(({item})=>String(item.id)===String(itemId));
      if(!found)return;
      const sec=SECTIONS.find(s=>s.id===S.section)||found.sec;
      addItemToColeccion(colId,found.item,sec).then(()=>div.remove());
    };
  });
}

// ── Nav common handler ────────────────────────────────────────────────────────
function setupNavColClick(){
  const nav=document.querySelector('.bottom-nav');
  if(!nav)return;
  // remove any existing listener by replacing
  const newNav=nav.cloneNode(true);
  nav.parentNode.replaceChild(newNav,nav);
  newNav.addEventListener('click',function(e){
    const btn=e.target.closest('[data-section]');if(!btn)return;
    const sec2=btn.getAttribute('data-section');
    const scrollLeft=newNav.scrollLeft;
    if(sec2==='__colecciones__'){
      S.view='colecciones';render();
      requestAnimationFrame(()=>{const n2=document.querySelector('.bottom-nav');if(n2)n2.scrollLeft=scrollLeft;});
      return;
    }
    S.view='library';S.section=sec2;S.filter='Todos';S.search='';render();
    requestAnimationFrame(()=>{const n2=document.querySelector('.bottom-nav');if(n2)n2.scrollLeft=scrollLeft;});
  });
}
