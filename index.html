<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08080a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Manhwa" />
  <meta name="description" content="Tu biblioteca personal de manhwas" />
  <title>Manhwa Tracker</title>

  <!-- PWA Manifest inline via JS (no external file needed) -->
  <link rel="manifest" href="#" id="manifest-placeholder" />

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #08080a;
      --surface: #0f0f11;
      --surface2: #141416;
      --border: #1e1e22;
      --border2: #2a2a2e;
      --text: #e0e0e0;
      --text-dim: #666;
      --text-muted: #333;
      --green: #4ade80;
      --purple: #818cf8;
      --red: #f87171;
      --yellow: #facc15;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inconsolata', monospace;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    body {
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(26,10,46,0.3) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(10,26,46,0.2) 0%, transparent 55%);
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8,8,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 1rem) 1.25rem 1rem;
    }

    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .header-title-group {}
    .header-eyebrow {
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #f0f0f0;
      line-height: 1;
    }

    .header-actions { display: flex; align-items: center; gap: 0.6rem; }

    .save-indicator {
      font-size: 0.6rem;
      font-family: monospace;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
    }
    .save-indicator.visible { opacity: 1; }
    .save-indicator.saved { color: var(--green); }
    .save-indicator.saving { color: var(--text-dim); }
    .save-indicator.error { color: var(--red); }

    .btn-add {
      background: linear-gradient(135deg, var(--purple), var(--green));
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      color: #000;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-appearance: none;
    }
    .btn-add:active { transform: scale(0.96); opacity: 0.85; }

    /* Stats row */
    .stats {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stat-label { font-size: 0.65rem; color: var(--text-dim); }
    .stat-count { font-size: 0.65rem; font-weight: 500; }

    /* ── FILTERS ── */
    .filters {
      padding: 0.85rem 1.25rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      align-items: center;
    }
    .filters::-webkit-scrollbar { display: none; }

    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 0.4rem 0.85rem;
      color: var(--text);
      font-family: monospace;
      font-size: 0.75rem;
      outline: none;
      width: 130px;
      -webkit-appearance: none;
    }
    .search-input::placeholder { color: #444; }

    .filter-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 0.4rem 0.85rem;
      color: var(--text-dim);
      font-family: monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      -webkit-appearance: none;
    }
    .filter-btn.active {
      color: #000;
      font-weight: 600;
    }
    .filter-btn:active { transform: scale(0.95); }

    /* ── GRID ── */
    .main { padding: 0.5rem 1.25rem calc(var(--safe-bottom) + 5rem); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.85rem;
    }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 5rem 1rem;
      font-size: 0.82rem;
      line-height: 1.8;
    }
    .empty span { display: block; font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.3; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .card:active { transform: scale(0.97); }

    .card-cover {
      position: relative;
      padding-top: 138%;
      background: #0a0a0c;
      overflow: hidden;
    }
    .card-cover img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #222;
      background: linear-gradient(135deg, #0f0f11, #1a1a1e);
    }

    .card-badge-status {
      position: absolute;
      top: 7px; right: 7px;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      padding: 3px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid transparent;
    }
    .card-badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .card-badge-text { font-size: 0.58rem; font-family: monospace; letter-spacing: 0.04em; }

    .card-badge-cap {
      position: absolute;
      bottom: 7px; left: 7px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 3px 7px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card-badge-cap span { font-size: 0.6rem; color: #999; font-family: monospace; }

    .card-body {
      padding: 0.75rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: 0.02em;
    }
    .card-desc {
      font-size: 0.65rem;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: auto;
      padding-top: 0.5rem;
    }
    .card-btn {
      flex: 1;
      padding: 5px 4px;
      background: transparent;
      border-radius: 6px;
      font-size: 0.65rem;
      cursor: pointer;
      font-family: monospace;
      transition: background 0.15s;
      -webkit-appearance: none;
    }
    .card-btn:active { opacity: 0.7; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: #0d0d0f;
      border: 1px solid var(--border2);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.25rem calc(var(--safe-bottom) + 1.5rem);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 0 auto 1.25rem;
    }
    .modal-title {
      font-family: 'Cinzel', serif;
      color: var(--text);
      font-size: 1rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
    }

    .modal-cover-row {
      display: flex;
      gap: 0.85rem;
      margin-bottom: 1.1rem;
    }
    .cover-upload {
      width: 80px; height: 112px;
      border-radius: 8px;
      border: 2px dashed #333;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .cover-upload img {
      width: 100%; height: 100%;
      object-fit: cover;
      position: absolute; inset: 0;
    }
    .cover-upload-label {
      font-size: 0.6rem;
      color: #444;
      text-align: center;
      padding: 0.4rem;
      line-height: 1.4;
      position: relative;
      z-index: 1;
    }

    .modal-fields { flex: 1; display: flex; flex-direction: column; gap: 0.6rem; }

    .field-input {
      width: 100%;
      background: #111113;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-family: monospace;
      font-size: 0.8rem;
      outline: none;
      -webkit-appearance: none;
    }
    .field-input:focus { border-color: #444; }
    .field-input::placeholder { color: #3a3a3e; }

    .field-row { display: flex; gap: 0.6rem; }

    textarea.field-input {
      resize: vertical;
      min-height: 72px;
      margin-top: 0;
    }

    .modal-footer {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      padding: 0.55rem 1rem;
      color: #555;
      font-family: monospace;
      font-size: 0.78rem;
      cursor: pointer;
      -webkit-appearance: none;
    }
    .btn-save {
      background: linear-gradient(135deg, var(--purple), var(--green));
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1.25rem;
      color: #000;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
      -webkit-appearance: none;
    }
    .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-save:active:not(:disabled) { opacity: 0.8; }

    /* ── STARS & LINK ── */
    .stars-row {
      display: flex; align-items: center; gap: 2px; margin-top: 0.4rem;
    }
    .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; line-height: 1; padding: 2px 1px;
      transition: transform 0.1s; -webkit-appearance: none;
    }
    .star-btn:active { transform: scale(1.3); }
    .stars-score {
      font-size: 0.62rem; color: var(--text-dim);
      font-family: monospace; margin-left: 5px;
    }
    .card-stars { display: flex; gap: 1px; align-items: center; margin-top: 2px; }
    .card-star { font-size: 0.62rem; line-height: 1; }
    .card-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.6rem; color: var(--purple); text-decoration: none;
      font-family: monospace; border: 1px solid rgba(129,140,248,0.25);
      border-radius: 6px; padding: 3px 7px; margin-top: 3px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 100%;
    }
    .card-link:active { opacity: 0.7; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 1.5rem);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1e;
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 0.6rem 1.25rem;
      font-size: 0.75rem;
      color: var(--text);
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── INSTALL BANNER ── */
    .install-banner {
      margin: 0.75rem 1.25rem 0;
      background: linear-gradient(135deg, rgba(129,140,248,0.12), rgba(74,222,128,0.08));
      border: 1px solid rgba(129,140,248,0.25);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .install-banner-text { font-size: 0.7rem; color: #aaa; line-height: 1.5; }
    .install-banner-text strong { color: var(--purple); display: block; font-family: 'Cinzel', serif; font-size: 0.72rem; }
    .btn-install {
      background: var(--purple);
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      color: #000;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-appearance: none;
    }
    .btn-dismiss {
      background: transparent;
      border: none;
      color: #444;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0.2rem;
    }

    /* loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 1rem;
    }
    .loading-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--purple);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    .loading-text { font-size: 0.7rem; color: #333; letter-spacing: 0.2em; }
  </style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loading-dot"></div>
    <p class="loading-text">CARGANDO...</p>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" />

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const STORAGE_KEY = 'manhwa-tracker-v2';
const STATES = ['Leyendo', 'Terminé', 'Abandoné', 'Quiero leer'];
const STATE_CONFIG = {
  'Leyendo':      { accent: '#4ade80', border: '#4ade8033' },
  'Terminé':      { accent: '#818cf8', border: '#818cf833' },
  'Abandoné':     { accent: '#f87171', border: '#f8717133' },
  'Quiero leer':  { accent: '#facc15', border: '#facc1533' },
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let state = {
  items: [],
  filter: 'Todos',
  search: '',
  modal: null,      // null | 'new' | {item object}
  modalForm: null,
  saveStatus: null, // 'saving' | 'saved' | 'error'
  installPrompt: null,
  showInstallBanner: false,
};

// ═══════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ items: state.items }));
    setSaveStatus('saved');
  } catch(e) {
    setSaveStatus('error');
  }
}

let saveStatusTimer = null;
function setSaveStatus(s) {
  state.saveStatus = s;
  clearTimeout(saveStatusTimer);
  renderSaveIndicator();
  if (s === 'saved') {
    saveStatusTimer = setTimeout(() => {
      state.saveStatus = null;
      renderSaveIndicator();
    }, 1500);
  }
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════════
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function placeholderCover(title) {
  return `https://placehold.co/200x280/111111/333333?text=${encodeURIComponent(title || '?')}`;
}

function filteredItems() {
  return state.items.filter(i => {
    const matchStatus = state.filter === 'Todos' || i.status === state.filter;
    const matchSearch = i.title.toLowerCase().includes(state.search.toLowerCase());
    return matchStatus && matchSearch;
  });
}

function counts() {
  const c = {};
  STATES.forEach(s => c[s] = state.items.filter(i => i.status === s).length);
  return c;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const c = counts();
  const items = filteredItems();

  const filterBtns = ['Todos', ...STATES].map(s => {
    const cfg = STATE_CONFIG[s];
    const active = state.filter === s;
    const style = active
      ? `background:${cfg ? cfg.accent : '#e2e2e2'};color:#000;border-color:${cfg ? cfg.accent : '#e2e2e2'}`
      : '';
    return `<button class="filter-btn${active ? ' active' : ''}" style="${style}" onclick="setFilter('${escHtml(s)}')">${escHtml(s)}</button>`;
  }).join('');

  const statsHtml = STATES.map(s => {
    const cfg = STATE_CONFIG[s];
    return `<div class="stat">
      <div class="stat-dot" style="background:${cfg.accent}"></div>
      <span class="stat-label">${escHtml(s)}</span>
      <span class="stat-count" style="color:${cfg.accent}">${c[s] || 0}</span>
    </div>`;
  }).join('');

  const saveText = state.saveStatus === 'saving' ? 'guardando...'
    : state.saveStatus === 'saved' ? '✦ guardado'
    : state.saveStatus === 'error' ? 'error' : '';
  const saveClass = state.saveStatus ? `save-indicator visible ${state.saveStatus}` : 'save-indicator';

  const installBannerHtml = state.showInstallBanner ? `
    <div class="install-banner">
      <div class="install-banner-text">
        <strong>Instalar como app</strong>
        Agrégala a tu pantalla de inicio para acceso rápido
      </div>
      <button class="btn-install" onclick="triggerInstall()">Instalar</button>
      <button class="btn-dismiss" onclick="dismissInstall()">✕</button>
    </div>` : '';

  const cardsHtml = items.length === 0
    ? `<div class="empty"><span>⛩</span>No hay manhwas aquí todavía...<br>¡Agrega el primero!</div>`
    : `<div class="grid">${items.map(renderCard).join('')}</div>`;

  app.innerHTML = `
    <header class="header">
      <div class="header-top">
        <div class="header-title-group">
          <p class="header-eyebrow">✦ biblioteca personal</p>
          <h1 class="header-title">Manhwa Tracker</h1>
        </div>
        <div class="header-actions">
          <span id="save-indicator" class="${saveClass}">${saveText}</span>
          <button class="btn-add" onclick="openModal('new')">+ Agregar</button>
        </div>
      </div>
      <div class="stats">${statsHtml}</div>
    </header>

    ${installBannerHtml}

    <div class="filters">
      <div class="search-wrap">
        <input class="search-input" type="search" placeholder="Buscar..." value="${escHtml(state.search)}"
          oninput="setSearch(this.value)" />
      </div>
      ${filterBtns}
    </div>

    <main class="main">${cardsHtml}</main>

    ${state.modal ? renderModal() : ''}
  `;
}

function renderCard(item) {
  const cfg = STATE_CONFIG[item.status] || STATE_CONFIG['Quiero leer'];
  const coverHtml = item.cover
    ? `<img src="${escHtml(item.cover)}" alt="${escHtml(item.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="card-cover-placeholder" style="display:none">📖</div>`
    : `<div class="card-cover-placeholder">📖</div>`;

  const capBadge = item.chapter
    ? `<div class="card-badge-cap"><span>Cap. ${escHtml(item.chapter)}</span></div>` : '';

  return `
    <div class="card" style="border-color:${cfg.border}" onclick="openModal(${JSON.stringify(JSON.stringify(item))})">
      <div class="card-cover">
        ${coverHtml}
        <div class="card-badge-status" style="border-color:${cfg.accent}44">
          <div class="card-badge-dot" style="background:${cfg.accent}"></div>
          <span class="card-badge-text" style="color:${cfg.accent}">${escHtml(item.status)}</span>
        </div>
        ${capBadge}
      </div>
      <div class="card-body">
        <h3 class="card-title">${escHtml(item.title)}</h3>
        ${item.description ? `<p class="card-desc">${escHtml(item.description)}</p>` : ''}
        ${item.rating ? `<div class="card-stars">${renderStarsDisplay(item.rating)}<span style="font-size:0.58rem;color:#666;margin-left:4px">${item.rating}/10</span></div>` : ''}
        ${item.link ? `<a class="card-link" href="${escHtml(item.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${escHtml(shortenUrl(item.link))}</a>` : ''}
        <div class="card-actions">
          <button class="card-btn" style="border:1px solid #4ade8044;color:#4ade80"
            onclick="event.stopPropagation();editItem(${escHtml(JSON.stringify(item))})">Editar</button>
          <button class="card-btn" style="border:1px solid #f8717144;color:#f87171"
            onclick="event.stopPropagation();deleteItem('${escHtml(item.id)}')">Eliminar</button>
        </div>
      </div>
    </div>`;
}

function renderModal() {
  const isNew = state.modal === 'new';
  const f = state.modalForm;
  const coverPreview = f.cover
    ? `<img src="${escHtml(f.cover)}" alt="portada" /><span class="cover-upload-label" style="position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:#fff">Cambiar</span>`
    : `<span class="cover-upload-label">📷<br>Subir foto</span>`;

  const stateOptions = STATES.map(s =>
    `<option value="${s}" ${f.status === s ? 'selected' : ''}>${s}</option>`
  ).join('');

  return `
    <div class="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <h2 class="modal-title">${isNew ? '✦ Agregar Manhwa' : '✦ Editar'}</h2>

        <div class="modal-cover-row">
          <div class="cover-upload" onclick="document.getElementById('file-input').click()">
            ${coverPreview}
          </div>
          <div class="modal-fields">
            <input class="field-input" type="text" placeholder="Título *"
              value="${escHtml(f.title)}" oninput="updateForm('title', this.value)" />
            <input class="field-input" type="url" placeholder="URL de portada (opcional)"
              value="${escHtml(f.cover)}" oninput="updateForm('cover', this.value)" />
          </div>
        </div>

        <div class="field-row" style="margin-bottom:0.6rem">
          <input class="field-input" type="number" placeholder="Cap. actual" style="width:110px;flex-shrink:0"
            value="${escHtml(f.chapter)}" oninput="updateForm('chapter', this.value)" />
          <select class="field-input" style="flex:1;cursor:pointer" onchange="updateForm('status', this.value)">
            ${stateOptions}
          </select>
        </div>

        <textarea class="field-input" placeholder="Descripción breve..."
          oninput="updateForm('description', this.value)">${escHtml(f.description)}</textarea>

        <input class="field-input" type="url" placeholder="🔗 Enlace donde lo lees (opcional)"
          value="${escHtml(f.link || '')}" oninput="updateForm('link', this.value)"
          style="margin-top:0.6rem" />

        <div style="margin-top:0.6rem">
          <p style="font-size:0.65rem;color:#555;font-family:monospace;margin-bottom:0.5rem" id="stars-label">
            Calificación: ${renderRatingLabel(f.rating)}
          </p>
          <div class="stars-row">${renderStarsEditor(f.rating || 0)}</div>
        </div>

        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" ${!f.title.trim() ? 'disabled' : ''} onclick="saveItem()">Guardar</button>
        </div>
      </div>
    </div>`;
}

function renderSaveIndicator() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  const saveText = state.saveStatus === 'saving' ? 'guardando...'
    : state.saveStatus === 'saved' ? '✦ guardado'
    : state.saveStatus === 'error' ? 'error' : '';
  el.className = state.saveStatus ? `save-indicator visible ${state.saveStatus}` : 'save-indicator';
  el.textContent = saveText;
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function renderStarsDisplay(rating) {
  let out = '';
  for (let n = 1; n <= 10; n++) {
    out += '<span class="card-star">' + (n <= rating ? '★' : '☆') + '</span>';
  }
  return out;
}

function renderStarsEditor(current) {
  let out = '';
  for (let n = 1; n <= 10; n++) {
    const star = n <= current ? '★' : '☆';
    const color = n <= current ? 'color:#facc15' : 'color:#333';
    out += '<button class="star-btn" style="' + color + '" onclick="setRating(' + n + ')" title="' + n + '">' + star + '</button>';
  }
  return out;
}

function renderRatingLabel(r) {
  return r ? '<span style="color:#facc15">' + r + '/10</span>' : '<span style="color:#444">sin calificar</span>';
}

function shortenUrl(url) {
  try {
    const u = new URL(url);
    return u.hostname.replace('www.','');
  } catch { return url.slice(0, 20) + '...'; }
}

// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════
function setFilter(f) { state.filter = f; render(); }
function setSearch(v) { state.search = v; render(); }

function openModal(data) {
  if (data === 'new') {
    state.modal = 'new';
    state.modalForm = { id: null, title: '', cover: '', chapter: '', status: 'Quiero leer', description: '', link: '', rating: 0 };
  } else {
    const item = typeof data === 'string' ? JSON.parse(data) : data;
    state.modal = 'edit';
    state.modalForm = { ...item };
  }
  render();
}

function editItem(item) { openModal(item); }

function closeModal() {
  state.modal = null;
  state.modalForm = null;
  render();
}

function setRating(n) {
  if (!state.modalForm) return;
  // Toggle off if same rating clicked twice
  state.modalForm.rating = state.modalForm.rating === n ? 0 : n;
  // Re-render just the stars section without full render for snappiness
  const row = document.querySelector('.stars-row');
  const label = document.getElementById('stars-label');
  if (row) row.innerHTML = renderStarsEditor(state.modalForm.rating || 0);
  if (label) label.innerHTML = 'Calificación: ' + renderRatingLabel(state.modalForm.rating);
}

function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

function updateForm(field, value) {
  state.modalForm[field] = value;
  // Re-render just save button state and cover preview without full render
  const saveBtn = document.querySelector('.btn-save');
  if (saveBtn) saveBtn.disabled = !state.modalForm.title.trim();
  if (field === 'cover') {
    const img = document.querySelector('.cover-upload img');
    const label = document.querySelector('.cover-upload .cover-upload-label');
    if (value) {
      if (!img) render(); // full re-render if no img yet
      else img.src = value;
    }
  }
}

function saveItem() {
  const f = state.modalForm;
  if (!f.title.trim()) return;
  if (f.id) {
    state.items = state.items.map(i => i.id === f.id ? { ...f } : i);
    showToast('✦ Guardado');
  } else {
    const newItem = { ...f, id: Date.now().toString() };
    state.items = [...state.items, newItem];
    showToast('✦ Agregado a tu lista');
  }
  saveData();
  closeModal();
}

function deleteItem(id) {
  if (!confirm('¿Eliminar este manhwa?')) return;
  state.items = state.items.filter(i => i.id != id);
  saveData();
  showToast('Eliminado');
  render();
}

// ═══════════════════════════════════════════════
//  FILE INPUT
// ═══════════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file || !state.modalForm) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    state.modalForm.cover = ev.target.result;
    render();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ═══════════════════════════════════════════════
//  INSTALL PWA
// ═══════════════════════════════════════════════
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  state.installPrompt = e;
  if (localStorage.getItem('install-dismissed') !== '1') {
    state.showInstallBanner = true;
    render();
  }
});

function triggerInstall() {
  if (!state.installPrompt) return;
  state.installPrompt.prompt();
  state.installPrompt.userChoice.then(() => {
    state.installPrompt = null;
    state.showInstallBanner = false;
    render();
  });
}

function dismissInstall() {
  state.showInstallBanner = false;
  localStorage.setItem('install-dismissed', '1');
  render();
}

window.addEventListener('appinstalled', () => {
  state.showInstallBanner = false;
  showToast('¡App instalada! 🎉');
  render();
});

// ═══════════════════════════════════════════════
//  SERVICE WORKER
// ═══════════════════════════════════════════════
const SW_CODE = `
const CACHE = 'manhwa-v1';
const ASSETS = [self.registration.scope];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => caches.match(self.registration.scope)))
  );
});
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {});
}

// ═══════════════════════════════════════════════
//  MANIFEST
// ═══════════════════════════════════════════════
const manifest = {
  name: 'Manhwa Tracker',
  short_name: 'Manhwa',
  description: 'Tu biblioteca personal de manhwas',
  start_url: './',
  display: 'standalone',
  background_color: '#08080a',
  theme_color: '#08080a',
  orientation: 'portrait',
  icons: [
    { src: generateIcon(192), sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
    { src: generateIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
  ]
};

function generateIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#08080a';
  ctx.fillRect(0, 0, size, size);
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#818cf8');
  grad.addColorStop(1, '#4ade80');
  ctx.fillStyle = grad;
  ctx.font = `bold ${size * 0.5}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⛩', size / 2, size / 2);
  return canvas.toDataURL('image/png');
}

const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const manifestUrl = URL.createObjectURL(manifestBlob);
document.getElementById('manifest-placeholder').setAttribute('href', manifestUrl);
