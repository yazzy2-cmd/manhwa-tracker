<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#08080a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mi Biblioteca"/>
  <title>Mi Biblioteca</title>
  <link rel="manifest" href="#" id="manifest-placeholder"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#08080a;--surface:#0f0f11;--border:#1e1e22;--border2:#2a2a2e;--text:#e0e0e0;--text-dim:#666;--text-muted:#333;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'Inconsolata',monospace;min-height:100vh;overscroll-behavior:none}
    .header{position:sticky;top:0;z-index:50;background:rgba(8,8,10,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + .9rem) 1.25rem .9rem}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:.75rem}
    .header-eyebrow{font-size:.58rem;color:var(--text-muted);letter-spacing:.22em;text-transform:uppercase;margin-bottom:2px}
    .header-title{font-family:'Cinzel',serif;font-size:clamp(1.2rem,5vw,1.7rem);font-weight:600;letter-spacing:.04em;color:#f0f0f0;line-height:1}
    .header-actions{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
    .save-indicator{font-size:.58rem;font-family:monospace;letter-spacing:.08em;opacity:0;transition:opacity .4s;white-space:nowrap}
    .save-indicator.visible{opacity:1}.save-indicator.saved{color:#4ade80}.save-indicator.saving{color:var(--text-dim)}.save-indicator.error{color:#f87171}
    .btn-add{border:none;border-radius:8px;padding:.5rem 1rem;color:#000;font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:.04em;white-space:nowrap;-webkit-appearance:none;transition:opacity .2s,transform .15s}
    .btn-add:active{transform:scale(.95);opacity:.85}
    .stats-bar{padding:.55rem 1.25rem;display:flex;gap:.6rem;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;border-bottom:1px solid var(--border);background:rgba(8,8,10,.6)}
    .stats-bar::-webkit-scrollbar{display:none}
    .stat{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .stat-dot{width:5px;height:5px;border-radius:50%}.stat-label{font-size:.62rem;color:var(--text-dim)}.stat-count{font-size:.62rem;font-weight:500}
    .filters{padding:.65rem 1.25rem;display:flex;gap:.45rem;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;align-items:center;border-bottom:1px solid var(--border)}
    .filters::-webkit-scrollbar{display:none}
    .search-input{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:.35rem .85rem;color:var(--text);font-family:monospace;font-size:.73rem;outline:none;width:115px;flex-shrink:0;-webkit-appearance:none}
    .search-input::placeholder{color:#3a3a3e}
    .filter-btn{flex-shrink:0;background:transparent;border:1px solid var(--border2);border-radius:20px;padding:.32rem .75rem;color:var(--text-dim);font-family:monospace;font-size:.67rem;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-appearance:none}
    .filter-btn.active{color:#000;font-weight:600}.filter-btn:active{transform:scale(.95)}
    .main{padding:.6rem 1.25rem calc(var(--safe-bottom) + 5.5rem)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.85rem}
    .empty{text-align:center;color:var(--text-muted);padding:4rem 1rem;font-size:.82rem;line-height:2}
    .empty-icon{font-size:2.5rem;display:block;margin-bottom:.5rem;opacity:.25}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .15s;cursor:pointer}
    .card:active{transform:scale(.97)}
    .card-cover{position:relative;padding-top:138%;background:#0a0a0c;overflow:hidden}
    .card-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
    .card-cover-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:linear-gradient(135deg,#0f0f11,#1a1a1e)}
    .card-badge-status{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);border-radius:20px;padding:3px 8px;display:flex;align-items:center;gap:4px;border:1px solid transparent}
    .card-badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}.card-badge-text{font-size:.56rem;font-family:monospace;letter-spacing:.03em}
    .card-badge-ep{position:absolute;bottom:7px;right:7px;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);border-radius:6px;padding:3px 7px;border:1px solid rgba(255,255,255,.06)}
    .card-badge-ep span{font-size:.58rem;color:#999;font-family:monospace}
    .card-body{padding:.7rem;flex:1;display:flex;flex-direction:column;gap:.28rem}
    .card-title{font-family:'Cinzel',serif;font-size:.76rem;color:var(--text);line-height:1.3;letter-spacing:.02em}
    .card-author{font-size:.62rem;color:#777;font-family:monospace}
    .card-desc{font-size:.63rem;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-stars{display:flex;gap:1px;align-items:center;margin-top:1px}.card-star{font-size:.6rem;line-height:1}
    .card-tag{font-size:.55rem;font-family:monospace;padding:2px 6px;border-radius:10px;border:1px solid transparent}
    .card-link{display:inline-flex;align-items:center;gap:4px;font-size:.58rem;color:#818cf8;text-decoration:none;font-family:monospace;border:1px solid rgba(129,140,248,.2);border-radius:5px;padding:2px 6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,10,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:var(--safe-bottom);z-index:60}
    .bottom-nav::-webkit-scrollbar{display:none}
    .nav-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.55rem 1.1rem;background:none;border:none;cursor:pointer;-webkit-appearance:none;min-width:72px}
    .nav-btn:active{opacity:.6}.nav-icon{font-size:1.2rem;line-height:1}
    .nav-label{font-family:'Inconsolata',monospace;font-size:.58rem;letter-spacing:.04em;white-space:nowrap}
    .nav-indicator{width:4px;height:4px;border-radius:50%;margin-top:2px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:#0d0d0f;border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:1.4rem 1.25rem calc(var(--safe-bottom) + 1.5rem);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
    @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto}
    .modal-close-btn{background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:50%;width:30px;height:30px;color:#aaa;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;-webkit-appearance:none;flex-shrink:0}
    .modal-title{font-family:'Cinzel',serif;color:var(--text);font-size:.95rem;letter-spacing:.08em}
    .modal-cover-row{display:flex;gap:.85rem;margin-bottom:1rem}
    .cover-upload{width:76px;height:107px;border-radius:8px;border:2px dashed #2a2a2e;background:#111;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;position:relative}
    .cover-upload img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .cover-upload-label{font-size:.58rem;color:#444;text-align:center;padding:.4rem;line-height:1.5;position:relative;z-index:1}
    .modal-fields{flex:1;display:flex;flex-direction:column;gap:.55rem}
    .field-input{width:100%;background:#111113;border:1px solid var(--border2);border-radius:8px;padding:.55rem .75rem;color:var(--text);font-family:monospace;font-size:.78rem;outline:none;-webkit-appearance:none}
    .field-input:focus{border-color:#444}.field-input::placeholder{color:#3a3a3e}
    .field-row{display:flex;gap:.55rem}
    textarea.field-input{resize:vertical;min-height:68px}
    .field-label{font-size:.62rem;color:#555;font-family:monospace;margin-bottom:.35rem;display:block}
    .tags-wrap{background:#111113;border:1px solid var(--border2);border-radius:8px;padding:.4rem .6rem;display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:40px;cursor:text}
    .tags-wrap:focus-within{border-color:#444}
    .tag-chip{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-family:monospace;padding:2px 8px;border-radius:20px;border:1px solid transparent}
    .tag-chip-remove{background:none;border:none;cursor:pointer;font-size:.7rem;color:inherit;opacity:.6;padding:0;line-height:1;-webkit-appearance:none}
    .tag-text-input{background:none;border:none;outline:none;color:var(--text);font-family:monospace;font-size:.75rem;min-width:80px;flex:1;-webkit-appearance:none}
    .tag-text-input::placeholder{color:#3a3a3e}
    .tag-suggestions{background:#111113;border:1px solid var(--border2);border-radius:8px;margin-top:3px;overflow:hidden;max-height:120px;overflow-y:auto}
    .tag-suggestion{padding:.45rem .75rem;font-size:.73rem;font-family:monospace;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:6px}
    .tag-suggestion:active{background:var(--border)}
    .stars-row{display:flex;gap:1px;align-items:center}
    .star-btn{background:none;border:none;cursor:pointer;font-size:1.25rem;line-height:1;padding:3px 2px;-webkit-appearance:none}
    .star-btn:active{transform:scale(1.3)}
    .modal-footer{display:flex;gap:.55rem;justify-content:flex-end;margin-top:1.2rem}
    .btn-secondary{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:.5rem 1rem;color:#555;font-family:monospace;font-size:.76rem;cursor:pointer;-webkit-appearance:none}
    .btn-primary{border:none;border-radius:8px;padding:.5rem 1.2rem;color:#000;font-family:'Cinzel',serif;font-size:.76rem;font-weight:700;cursor:pointer;letter-spacing:.04em;-webkit-appearance:none}
    .btn-primary:disabled{opacity:.3;cursor:not-allowed}
    .btn-danger{background:transparent;border:1px solid #f8717133;border-radius:8px;padding:.5rem 1rem;color:#f87171;font-family:monospace;font-size:.76rem;cursor:pointer;-webkit-appearance:none;flex:1}
    .btn-edit{background:transparent;border:1px solid #4ade8033;border-radius:8px;padding:.5rem 1rem;color:#4ade80;font-family:monospace;font-size:.76rem;cursor:pointer;-webkit-appearance:none;flex:1}
    .toast{position:fixed;bottom:calc(var(--safe-bottom) + 5.5rem);left:50%;transform:translateX(-50%) translateY(40px);background:#1a1a1e;border:1px solid var(--border2);border-radius:20px;padding:.55rem 1.2rem;font-size:.73rem;color:var(--text);z-index:300;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;white-space:nowrap;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    /* LOGIN */
    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;gap:1.5rem}
    .login-emoji{font-size:3.5rem}
    .login-title{font-family:'Cinzel',serif;font-size:1.6rem;color:#f0f0f0;letter-spacing:.05em}
    .login-sub{font-size:.78rem;color:#555;line-height:1.6;max-width:260px}
    .btn-google{display:flex;align-items:center;gap:.75rem;background:#fff;border:none;border-radius:12px;padding:.75rem 1.5rem;font-family:'Inconsolata',monospace;font-size:.85rem;font-weight:600;color:#222;cursor:pointer;transition:opacity .2s,transform .15s;-webkit-appearance:none}
    .btn-google:active{transform:scale(.96);opacity:.85}
    .btn-google img{width:20px;height:20px}
    /* SYNC BADGE */
    .sync-badge{font-size:.58rem;font-family:monospace;color:#555;display:flex;align-items:center;gap:4px}
    .sync-dot{width:5px;height:5px;border-radius:50%;background:#4ade80}
    /* USER AVATAR */
    .user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid #333;cursor:pointer}
    .user-initials{width:28px;height:28px;border-radius:50%;background:#2a2a2e;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#888;cursor:pointer;border:1px solid #333}
    /* INSTALL */
    .install-banner{margin:.6rem 1.25rem;background:linear-gradient(135deg,rgba(129,140,248,.1),rgba(74,222,128,.07));border:1px solid rgba(129,140,248,.22);border-radius:12px;padding:.7rem .9rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
    .install-banner-text{font-size:.67rem;color:#aaa;line-height:1.5}
    .install-banner-text strong{color:#818cf8;display:block;font-family:'Cinzel',serif}
    .btn-install{background:#818cf8;border:none;border-radius:7px;padding:.4rem .85rem;color:#000;font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;cursor:pointer;flex-shrink:0;-webkit-appearance:none}
    .btn-dismiss{background:transparent;border:none;color:#444;font-size:1rem;cursor:pointer;flex-shrink:0;padding:.2rem}
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" style="display:none"/>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {getFirestore,doc,getDoc,setDoc,initializeFirestore,persistentLocalCache,persistentMultipleTabManager} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

/* ©¤©¤ FIREBASE CONFIG ©¤©¤ */
const firebaseConfig = {
  apiKey: "AIzaSyB4157kNRM1snA97PoqDjNtv87R5GREHRc",
  authDomain: "mi-biblioteca-2de7d.firebaseapp.com",
  projectId: "mi-biblioteca-2de7d",
  storageBucket: "mi-biblioteca-2de7d.firebasestorage.app",
  messagingSenderId: "1094712813553",
  appId: "1:1094712813553:web:7ccc569c626ff065330650"
};
const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db = initializeFirestore(fbApp, {
  cache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
});

// Enable offline persistence
// offline persistence enabled via FirestoreSettings

/* ©¤©¤ APP CONFIG ©¤©¤ */
const SECTIONS = [
  {id:'manhwas',  label:'Manhwas',   emoji:'&#128214;', color:'#818cf8', epLabel:'Cap.', hasAuthor:false},
  {id:'animes',   label:'Animes',    emoji:'&#127756;', color:'#f87171', epLabel:'Ep.',  hasAuthor:false},
  {id:'doramas',  label:'Doramas',   emoji:'&#127917;', color:'#22d3ee', epLabel:'Ep.',  hasAuthor:false},
  {id:'dramas',   label:'Dramas',    emoji:'&#127916;', color:'#fb923c', epLabel:'Ep.',  hasAuthor:false},
  {id:'peliculas',label:'Pel&iacute;culas', emoji:'&#127871;', color:'#e879f9', epLabel:'',     hasAuthor:false},
  {id:'series',   label:'Series',    emoji:'&#128250;', color:'#34d399', epLabel:'Ep.',  hasAuthor:false},
  {id:'libros',   label:'Libros',    emoji:'&#128218;', color:'#a3e635', epLabel:'P&aacute;g.', hasAuthor:true},
];
const STATES = ['Leyendo','Terminado','Abandonado','Pendiente'];
const STATE_CFG = {
  'Leyendo':{accent:'#4ade80'},'Terminado':{accent:'#818cf8'},
  'Abandonado':{accent:'#f87171'},'Pendiente':{accent:'#facc15'},
};
const VIENDO = ['animes','doramas','dramas','peliculas','series'];
const VISTA  = ['peliculas'];

/* ©¤©¤ STATE ©¤©¤ */
let S = {
  user: null,
  section:'manhwas', data:{}, tags:{},
  filter:'Todos', search:'',
  modal:null, modalForm:null,
  tagInput:'', saveStatus:null,
  syncing: false,
  installPrompt:null, showInstallBanner:false,
};
SECTIONS.forEach(s => { S.data[s.id]=[]; S.tags[s.id]=[]; });

/* ©¤©¤ FIREBASE DATA ©¤©¤ */
async function loadFromCloud() {
  if(!S.user) return;
  try {
    const ref = doc(db, 'users', S.user.uid);
    const snap = await getDoc(ref);
    if(snap.exists()) {
      const d = snap.data();
      if(d.data) SECTIONS.forEach(s => { S.data[s.id] = d.data[s.id] || []; });
      if(d.tags) SECTIONS.forEach(s => { S.tags[s.id] = d.tags[s.id] || []; });
    }
  } catch(e) {
    // offline ¡ª load from localStorage fallback
    loadLocalFallback();
  }
}

function loadLocalFallback() {
  try {
    const r = localStorage.getItem('biblioteca-local');
    if(r) {
      const d = JSON.parse(r);
      if(d.data) SECTIONS.forEach(s => { S.data[s.id] = d.data[s.id] || []; });
      if(d.tags) SECTIONS.forEach(s => { S.tags[s.id] = d.tags[s.id] || []; });
    }
  } catch(e) {}
}

let saveTimer = null;
function saveData() {
  // Always save locally first
  try {
    localStorage.setItem('biblioteca-local', JSON.stringify({data:S.data, tags:S.tags}));
  } catch(e) {}
  // Then sync to cloud
  setSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if(!S.user) { setSaveStatus('saved'); return; }
    try {
      await setDoc(doc(db, 'users', S.user.uid), {
        data: S.data,
        tags: S.tags,
        updatedAt: Date.now()
      });
      setSaveStatus('saved');
    } catch(e) {
      setSaveStatus('error');
    }
  }, 800);
}

let saveStatusTimer = null;
function setSaveStatus(s) {
  S.saveStatus = s;
  clearTimeout(saveStatusTimer);
  const el = document.getElementById('save-indicator');
  if(el) {
    el.className = s ? 'save-indicator visible '+s : 'save-indicator';
    el.textContent = s==='saving'?'sincronizando...':s==='saved'?'&#10022; guardado':s==='error'?'sin conexi&oacute;n':'';
  }
  if(s==='saved') saveStatusTimer = setTimeout(() => setSaveStatus(null), 2000);
}

/* ©¤©¤ AUTH ©¤©¤ */
async function loginWithGoogle() {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { showToast('Error al iniciar sesi&oacute;n'); }
}

async function logout() {
  if(!confirm('&iquest;Cerrar sesi&oacute;n?')) return;
  await signOut(auth);
}

onAuthStateChanged(auth, async (user) => {
  S.user = user;
  if(user) {
    await loadFromCloud();
    render();
  } else {
    renderLogin();
  }
});

/* ©¤©¤ HELPERS ©¤©¤ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function imgErr(el){el.style.display='none';const n=el.nextElementSibling;if(n)n.style.display='flex';}
function curSec(){return SECTIONS.find(s=>s.id===S.section);}
function curItems(){return S.data[S.section]||[];}
function filtered(){
  return curItems().filter(i =>
    (S.filter==='Todos'||i.status===S.filter) &&
    i.title.toLowerCase().includes(S.search.toLowerCase())
  );
}
function counts(id){
  const items=S.data[id]||[],c={total:items.length};
  STATES.forEach(s=>c[s]=items.filter(i=>i.status===s).length);
  return c;
}
function shortenUrl(url){try{return new URL(url).hostname.replace('www.','');}catch(e){return url.slice(0,18)+'...';}}
function stateLabel(secId,s){
  if(s==='Leyendo'){if(VISTA.includes(secId))return 'Vista';if(VIENDO.includes(secId))return 'Viendo';}
  return s;
}
function starsHtml(r,sz){
  let o='';for(let n=1;n<=10;n++)o+=`<span class="card-star" style="font-size:${sz}">${n<=r?'&#9733;':'&#9734;'}</span>`;return o;
}
function starsEditorHtml(cur){
  let o='';
  for(let n=1;n<=10;n++){const c=n<=cur?'color:#facc15':'color:#2a2a2e';o+=`<button class="star-btn" style="${c}" data-star="${n}">${n<=cur?'&#9733;':'&#9734;'}</button>`;}
  return o;
}
function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

/* ©¤©¤ TAGS ©¤©¤ */
function getSuggestions(input){
  if(!input.trim())return[];
  const known=S.tags[S.section]||[],cur=(S.modalForm&&S.modalForm.tags)||[];
  return known.filter(t=>t.toLowerCase().includes(input.toLowerCase())&&!cur.includes(t)).slice(0,6);
}
function addTag(tag){
  tag=tag.trim();if(!tag||!S.modalForm)return;
  if(!S.modalForm.tags)S.modalForm.tags=[];
  if(S.modalForm.tags.includes(tag))return;
  S.modalForm.tags=[...S.modalForm.tags,tag];
  if(!S.tags[S.section].includes(tag))S.tags[S.section].push(tag);
  S.tagInput='';rerenderTags();
}
function removeTag(tag){
  if(!S.modalForm)return;
  S.modalForm.tags=(S.modalForm.tags||[]).filter(t=>t!==tag);
  rerenderTags();
}
function rerenderTags(){
  const w=document.getElementById('tags-wrap'),sg=document.getElementById('tag-suggestions');
  if(w)w.innerHTML=tagsWrapInner();
  if(sg)sg.innerHTML=tagSuggestionsHtml();
  setupTagInput();
  const inp=document.getElementById('tag-input');if(inp)inp.focus();
}
function tagsWrapInner(){
  const color=curSec().color,tags=(S.modalForm&&S.modalForm.tags)||[];
  let o=tags.map(t=>`<span class="tag-chip" style="background:${hex2rgba(color,.12)};border-color:${hex2rgba(color,.3)};color:${color}">${esc(t)}<button class="tag-chip-remove" data-tag="${esc(t)}">&#10005;</button></span>`).join('');
  o+=`<input id="tag-input" class="tag-text-input" placeholder="${tags.length?'Otro tag...':'Ej: Romance, Acci&oacute;n...'}" value="${esc(S.tagInput)}" autocomplete="off"/>`;
  return o;
}
function tagSuggestionsHtml(){
  const suggs=getSuggestions(S.tagInput);if(!suggs.length)return'';
  const color=curSec().color;
  return suggs.map(t=>`<div class="tag-suggestion" data-sugg="${esc(t)}"><span style="color:${color};font-size:.7rem">&#10022;</span>${esc(t)}</div>`).join('');
}
function setupTagInput(){
  const inp=document.getElementById('tag-input');if(!inp)return;
  inp.oninput=function(){S.tagInput=this.value;const sg=document.getElementById('tag-suggestions');if(sg)sg.innerHTML=tagSuggestionsHtml();setupTagInput();};
  inp.onkeydown=function(e){
    if(e.key==='Enter'||e.key===','){e.preventDefault();if(S.tagInput.trim())addTag(S.tagInput);}
    else if(e.key==='Backspace'&&!S.tagInput){const tags=(S.modalForm&&S.modalForm.tags)||[];if(tags.length)removeTag(tags[tags.length-1]);}
  };
  const wrap=document.getElementById('tags-wrap');
  if(wrap)wrap.onclick=function(e){const btn=e.target.closest('[data-tag]');if(btn){removeTag(btn.getAttribute('data-tag'));return;}inp.focus();};
  const sg=document.getElementById('tag-suggestions');
  if(sg)sg.onclick=function(e){const d=e.target.closest('[data-sugg]');if(d)addTag(d.getAttribute('data-sugg'));};
}

/* ©¤©¤ LINKS EDITOR ©¤©¤ */
function renderLinksEditor(links){
  if(!links||!links.length)return'';
  return links.map((l,i)=>`<div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem"><a href="${esc(l)}" target="_blank" class="card-link" style="flex:1;font-size:.68rem;padding:4px 8px">&#128279; ${esc(shortenUrl(l))}</a><button class="btn-secondary" style="padding:3px 8px;font-size:.7rem" data-link-idx="${i}">&#10005;</button></div>`).join('');
}
function setupLinksEditor(){
  const list=document.getElementById('links-list');
  if(list)list.onclick=function(e){const btn=e.target.closest('[data-link-idx]');if(btn){removeLink(parseInt(btn.getAttribute('data-link-idx')));} };
  const addBtn=document.getElementById('link-add-btn');if(addBtn)addBtn.onclick=addLink;
  const inp=document.getElementById('link-input');if(inp)inp.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();addLink();}};
}
function addLink(){
  const inp=document.getElementById('link-input');if(!inp||!inp.value.trim())return;
  if(!S.modalForm.links)S.modalForm.links=[];
  S.modalForm.links=[...S.modalForm.links,inp.value.trim()];inp.value='';
  const el=document.getElementById('links-list');if(el)el.innerHTML=renderLinksEditor(S.modalForm.links);
  setupLinksEditor();
}
function removeLink(i){
  if(!S.modalForm)return;
  S.modalForm.links=S.modalForm.links.filter((_,idx)=>idx!==i);
  const el=document.getElementById('links-list');if(el)el.innerHTML=renderLinksEditor(S.modalForm.links);
  setupLinksEditor();
}

/* ©¤©¤ STARS EDITOR ©¤©¤ */
function setupStarsEditor(){
  const ed=document.getElementById('stars-editor');if(!ed)return;
  ed.onclick=function(e){
    const btn=e.target.closest('[data-star]');if(!btn)return;
    const n=parseInt(btn.getAttribute('data-star'));

/* ©¤©¤ EVENT SETUP ©¤©¤ */
function setupEvents(){
  const btnAdd=document.getElementById('btn-add-item');
  if(btnAdd)btnAdd.addEventListener('click',()=>openModal('new'));
  const btnLogout=document.getElementById('btn-logout');
  if(btnLogout)btnLogout.addEventListener('click',logout);
  const si=document.getElementById('search-inp');
  if(si)si.oninput=function(){S.search=this.value;renderGrid();};
  const fb=document.querySelector('.filters');
  if(fb)fb.addEventListener('click',function(e){
    const btn=e.target.closest('[data-filter]');if(!btn)return;
    const scrollLeft=fb.scrollLeft;
    S.filter=btn.getAttribute('data-filter');
    renderGrid();
    fb.querySelectorAll('.filter-btn').forEach(b=>{
      const s=b.getAttribute('data-filter'),active=S.filter===s,cfg=STATE_CFG[s];
      b.className='filter-btn'+(active?' active':'');
      b.style.cssText=active?(cfg?`background:${cfg.accent};color:#000;border-color:${cfg.accent}`:'background:#e2e2e2;color:#000;border-color:#e2e2e2'):'';
    });
    requestAnimationFrame(()=>{fb.scrollLeft=scrollLeft;});
  });
  const nav=document.querySelector('.bottom-nav');
  if(nav)nav.addEventListener('click',function(e){
    const btn=e.target.closest('[data-section]');if(!btn)return;
    const scrollLeft=nav.scrollLeft;
    S.section=btn.getAttribute('data-section');S.filter='Todos';S.search='';
    render();
    requestAnimationFrame(()=>{const n2=document.querySelector('.bottom-nav');if(n2)n2.scrollLeft=scrollLeft;});
  });
  setupGridClicks();
  const binst=document.getElementById('btn-install-pwa');if(binst)binst.addEventListener('click',triggerInstall);
  const bdism=document.getElementById('btn-dismiss-pwa');if(bdism)bdism.addEventListener('click',dismissInstall);
  // detail modal
  const dOverlay=document.getElementById('detail-overlay');
  if(dOverlay){
    dOverlay.addEventListener('click',e=>{if(e.target===dOverlay)closeModal();});
    const dClose=document.getElementById('detail-close');
    if(dClose)dClose.addEventListener('click',closeModal);
    const dEdit=document.getElementById('detail-edit-btn');
    if(dEdit)dEdit.addEventListener('click',()=>{const id=S.modalForm.id;closeModal();setTimeout(()=>openModalById(id),50);});
    const dDel=document.getElementById('detail-del-btn');
    if(dDel)dDel.addEventListener('click',()=>{
      const id=String(S.modalForm.id);
      S.data[S.section]=S.data[S.section].filter(i=>String(i.id)!==id);
      saveData();S.modal=null;S.modalForm=null;render();showToast('Eliminado');
    });
  }
  // edit modal
  const eOverlay=document.getElementById('edit-overlay');
  if(eOverlay){
    eOverlay.addEventListener('click',e=>{if(e.target===eOverlay)closeModal();});
    const eClose=document.getElementById('edit-close');if(eClose)eClose.addEventListener('click',closeModal);
    const ft=document.getElementById('field-title');if(ft)ft.oninput=function(){S.modalForm.title=this.value;const s=document.getElementById('btn-save-item');if(s)s.disabled=!this.value.trim();};
    const fa=document.getElementById('field-author');if(fa)fa.oninput=function(){S.modalForm.author=this.value;};
    const fc=document.getElementById('field-cover');if(fc)fc.oninput=function(){S.modalForm.cover=this.value;};
    const fch=document.getElementById('field-chapter');if(fch)fch.oninput=function(){S.modalForm.chapter=this.value;};
    const fs=document.getElementById('field-status');if(fs)fs.onchange=function(){S.modalForm.status=this.value;};
    const fd=document.getElementById('field-desc');if(fd)fd.oninput=function(){S.modalForm.description=this.value;};
    const cup=document.getElementById('cover-upload-btn');if(cup)cup.addEventListener('click',()=>document.getElementById('file-input').click());
    const bsave=document.getElementById('btn-save-item');if(bsave){bsave.disabled=!S.modalForm.title.trim();bsave.addEventListener('click',saveItem);}
    setupLinksEditor();setupTagInput();setupStarsEditor();
  }
}

function setupGridClicks(){
  const grid=document.getElementById('main-grid');if(!grid)return;
  grid.onclick=function(e){
    const card=e.target.closest('.card[data-id]');if(!card)return;
    openDetailById(card.getAttribute('data-id'));
  };
}

/* ©¤©¤ ACTIONS ©¤©¤ */
function openDetailById(id){
  const item=curItems().find(i=>String(i.id)===String(id));if(!item)return;
  S.modal='detail';S.modalForm=item;
  history.pushState({modal:true},'');render();
}
function openModalById(id){
  const item=curItems().find(i=>String(i.id)===String(id));if(!item)return;
  openModal(item);
}
function openModal(data){
  S.tagInput='';
  history.pushState({modal:true},'');
  if(data==='new'){
    S.modal='new';
    S.modalForm={id:null,title:'',cover:'',chapter:'',status:'Pendiente',description:'',links:[],rating:0,tags:[],author:''};
  }else{
    const item=typeof data==='string'?JSON.parse(data):data;
    S.modal='edit';
    const base={tags:[],author:'',links:[],...item};
    if(base.link&&(!base.links||!base.links.length)){base.links=[base.link];delete base.link;}
    S.modalForm=base;
  }
  render();
}
function closeModal(){S.modal=null;S.modalForm=null;render();}

function saveItem(){
  const f=S.modalForm;if(!f||!f.title.trim())return;
  if(S.tagInput.trim())addTag(S.tagInput);
  const li=document.getElementById('link-input');
  if(li&&li.value.trim()){if(!f.links)f.links=[];f.links.push(li.value.trim());}
  const item={...f,tags:f.tags||[],links:f.links||[]};
  if(item.id){
    S.data[S.section]=S.data[S.section].map(i=>String(i.id)===String(item.id)?item:i);
    showToast('&#10022; Guardado');
  }else{
    item.id=String(Date.now());
    S.data[S.section]=[...S.data[S.section],item];
    showToast('&#10022; Agregado');
  }
  saveData();closeModal();
}

/* ©¤©¤ TOAST ©¤©¤ */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ©¤©¤ FILE INPUT ©¤©¤ */
document.getElementById('file-input').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file||!S.modalForm)return;
  const reader=new FileReader();
  reader.onload=ev=>{S.modalForm.cover=ev.target.result;render();};
  reader.readAsDataURL(file);e.target.value='';
});

/* ©¤©¤ BACK BUTTON ©¤©¤ */
window.addEventListener('popstate',()=>{if(S.modal){S.modal=null;S.modalForm=null;render();}});

/* ©¤©¤ PWA INSTALL ©¤©¤ */
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();S.installPrompt=e;
  if(localStorage.getItem('install-dismissed')!=='1'){S.showInstallBanner=true;}
});
function triggerInstall(){
  if(!S.installPrompt)return;S.installPrompt.prompt();
  S.installPrompt.userChoice.then(()=>{S.installPrompt=null;S.showInstallBanner=false;render();});
}
function dismissInstall(){S.showInstallBanner=false;localStorage.setItem('install-dismissed','1');render();}
window.addEventListener('appinstalled',()=>{S.showInstallBanner=false;showToast('&iexcl;App instalada! &#127881;');});

/* ©¤©¤ MANIFEST ©¤©¤ */
function makeIcon(size){
  const cv=document.createElement('canvas');cv.width=cv.height=size;
  const ctx=cv.getContext('2d');ctx.fillStyle='#08080a';ctx.fillRect(0,0,size,size);
  ctx.font=`bold ${size*.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('&#128218;',size/2,size/2);return cv.toDataURL('image/png');
}
const manifest={name:'Mi Biblioteca',short_name:'Biblioteca',start_url:'/manhwa-tracker/',display:'standalone',background_color:'#08080a',theme_color:'#08080a',orientation:'portrait',icons:[{src:makeIcon(192),sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:makeIcon(512),sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
document.getElementById('manifest-placeholder').href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
